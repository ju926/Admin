<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
header{
background:linear-gradient(90deg,#2563eb,#ef4444);
padding:15px;
text-align:center;
font-weight:bold;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:15px;
}

/* ORDER CARD */
.card{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* TITLE */
h3{
margin:0;
color:#22c55e;
}

/* INFO */
p{
margin:5px 0;
font-size:14px;
opacity:0.9;
}

/* ITEMS */
.items{
background:#0f172a;
padding:10px;
border-radius:10px;
margin-top:10px;
}

/* BADGE */
.badge{
display:inline-block;
padding:4px 8px;
background:#2563eb;
border-radius:8px;
font-size:12px;
margin-top:5px;
}
</style>

</head>

<body>

<header>📦 Admin Order Dashboard</header>

<div class="container" id="orders"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

function loadOrders(){

fetch(API+"/orders")
.then(res=>res.json())
.then(data=>{

document.getElementById("orders").innerHTML =
data.map(o=>`

<div class="card">

<h3>${o.fullName}</h3>

<p>📞 ${o.phone}</p>
<p>📍 ${o.location}</p>
<p>📧 ${o.email}</p>

<div class="items">
<b>Items:</b>
<ul>
${o.items.map(i=>`<li>${i.name} - KES ${i.price}</li>`).join("")}
</ul>
</div>

<span class="badge">Status: Pending</span>

</div>

`).join("");

});

}

loadOrders();

</script>

</body>
</html>
