<!DOCTYPE html>
<html>
<head>
<title>Admin Orders</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}
.card{background:#111827;margin:10px;padding:10px;border-radius:10px}
button{padding:5px;margin:3px;border:none;border-radius:6px;cursor:pointer}
</style>

</head>

<body>

<h2>📦 Orders Dashboard</h2>
<div id="orders"></div>

<script>

const API="https://phone-store-backend-9w7p.onrender.com";

function load(){

fetch(API+"/orders")
.then(r=>r.json())
.then(data=>{

document.getElementById("orders").innerHTML =
(data ?? []).map(o=>`

<div class="card">

<h3>${o?.fullName ?? "No Name"}</h3>
<p>${o?.phone ?? ""}</p>
<p>${o?.location ?? ""}</p>

<p>Status: <b>${o?.status ?? "Pending"}</b></p>

<ul>
${(o?.items ?? []).map(i=>`
<li>${i?.name ?? "Item"} - KES ${i?.price ?? 0}</li>
`).join("")}
</ul>

</div>

`).join("");

});

}

load();

</script>

</body>
</html>
