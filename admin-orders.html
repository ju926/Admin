<!DOCTYPE html>
<html>
<head>
<title>Orders Dashboard</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}
.container{max-width:900px;margin:auto;padding:15px}

.card{background:#111827;padding:15px;margin-bottom:10px;border-radius:10px}

button{padding:6px 10px;margin:3px;border:none;border-radius:6px;cursor:pointer}

.pending{background:#facc15}
.processing{background:#2563eb;color:white}
.delivered{background:#22c55e;color:white}
</style>

</head>

<body>

<div class="container">
<h2>📦 Orders Dashboard</h2>
<div id="orders"></div>
</div>

<script>

const API="https://phone-store-backend-9w7p.onrender.com";

function load(){

fetch(API+"/orders")
.then(r=>r.json())
.then(data=>{

document.getElementById("orders").innerHTML =
data.map(o=>`
<div class="card">

<h3>${o.fullName}</h3>
<p>${o.phone}</p>
<p>${o.location}</p>
<p>Status: <b>${o.status}</b></p>

<ul>
${o.items.map(i=>`<li>${i.name} - KES ${i.price}</li>`).join("")}
</ul>

<button class="pending" onclick="update('${o._id}','Pending')">Pending</button>
<button class="processing" onclick="update('${o._id}','Processing')">Processing</button>
<button class="delivered" onclick="update('${o._id}','Delivered')">Delivered</button>

</div>
`).join("");

});

}

load();

function update(id,status){

fetch(API+"/update-order-status/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({status})
})
.then(()=>load());

}

</script>

</body>
</html>
