<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
header{
padding:15px;
text-align:center;
background:#111827;
font-size:18px;
font-weight:bold;
}

/* CONTAINER */
.container{
padding:15px;
max-width:600px;
margin:auto;
}

/* INPUTS */
input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#111827;
color:white;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:active{
transform:scale(0.98);
}

/* PREVIEW IMAGE */
#preview{
width:100px;
height:100px;
object-fit:cover;
border-radius:10px;
margin-top:10px;
display:none;
}

/* PRODUCT LIST */
.card{
background:#111827;
padding:10px;
margin-top:10px;
border-radius:10px;
display:flex;
gap:10px;
align-items:center;
}

.card img{
width:60px;
height:60px;
object-fit:cover;
border-radius:8px;
background:#0f172a;
}
</style>

</head>

<body>

<header>🛠️ Admin Panel</header>

<div class="container">

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">

<input type="file" id="imageFile">

<img id="preview">

<button onclick="add()">Add Product</button>

<div id="list"></div>

</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* =========================
   IMAGE PREVIEW (NEW FEATURE)
========================= */
document.getElementById("imageFile").addEventListener("change", function(e){

let file = e.target.files[0];

if(file){
let reader = new FileReader();

reader.onload = function(){
document.getElementById("preview").src = reader.result;
document.getElementById("preview").style.display = "block";
}

reader.readAsDataURL(file);
}

});

/* =========================
   LOAD PRODUCTS
========================= */
function load(){

fetch(API+"/products")
.then(res=>res.json())
.then(data=>{

document.getElementById("list").innerHTML =
data.map(p=>{

let img = p.image;

if(img && !img.startsWith("http")){
img = API + "/uploads/" + img;
}

return `
<div class="card">
<img src="${img}">
<div>
<b>${p.name}</b><br>
KES ${p.price}
</div>
</div>
`;
}).join("");

});

}

load();

/* =========================
   ADD PRODUCT (FIXED + SAFE)
========================= */
async function add(){

try{

let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let file = document.getElementById("imageFile").files[0];

if(!name || !price || !file){
alert("Fill all fields");
return;
}

let formData = new FormData();
formData.append("name", name);
formData.append("price", price);
formData.append("image", file);

let btn = document.querySelector("button");
btn.innerText = "Uploading...";
btn.disabled = true;

await fetch(API+"/add-product-upload",{
method:"POST",
body:formData
});

btn.innerText = "Add Product";
btn.disabled = false;

document.getElementById("name").value = "";
document.getElementById("price").value = "";
document.getElementById("imageFile").value = "";
document.getElementById("preview").style.display = "none";

load();

}catch(err){
console.log(err);
alert("Upload failed");
}

}

</script>

</body>
</html>
