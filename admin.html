<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
padding:15px;
background:linear-gradient(90deg,#2563eb,#dc2626);
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{padding:10px}

/* GRID */
#products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
}

#orders{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:12px;
}

/* CARD */
.card{
background:#111827;
padding:10px;
border-radius:10px;
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

/* IMAGE */
img{
width:100%;
height:120px;
object-fit:contain;
background:#000;
border-radius:8px;
}

/* INPUTS */
input{
padding:10px;
margin:6px 0;
width:100%;
border:none;
border-radius:10px;
outline:none;
background:#1f2937;
color:white;
transition:0.2s;
}

input:focus{
border:1px solid #2563eb;
box-shadow:0 0 8px #2563eb55;
}

/* BEAUTIFUL FILE UPLOAD */
.file-upload{
margin:8px 0;
}

.file-upload label{
display:block;
background:linear-gradient(90deg,#2563eb,#dc2626);
color:white;
padding:12px;
border-radius:10px;
text-align:center;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.file-upload label:hover{
transform:scale(1.03);
opacity:0.9;
}

.file-upload input{
display:none;
}

/* BUTTONS */
button{
padding:8px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
opacity:0.9;
}

.del{background:#ef4444;color:white}
.edit{background:#f59e0b;color:white}
.status{background:#22c55e;color:white}

/* HEADINGS */
h3{
margin-top:20px;
}

</style>

</head>

<body>

<header>🛠 Admin Dashboard</header>

<div class="container">

<h3>➕ Add Product</h3>

<div class="card">

<input id="pname" placeholder="Phone Name">
<input id="pprice" type="number" placeholder="Price">

<div class="file-upload">
<label for="pimage">📷 Choose Product Image</label>
<input type="file" id="pimage">
</div>

<button onclick="uploadProduct()" id="uploadBtn">Upload Product</button>

</div>

<h3>📦 Orders</h3>
<div id="orders">Loading...</div>

<h3>🛍 Products</h3>
<div id="products">Loading...</div>

</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* UPLOAD PRODUCT */
async function uploadProduct(){

let btn=document.getElementById("uploadBtn");
btn.innerText="Uploading...";
btn.disabled=true;

let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;
let file=document.getElementById("pimage").files[0];

if(!name || !price || !file){
alert("Fill all fields");
btn.innerText="Upload Product";
btn.disabled=false;
return;
}

let formData=new FormData();
formData.append("name",name);
formData.append("price",price);
formData.append("image",file);

try{
let res=await fetch(API+"/products",{method:"POST",body:formData});

if(res.ok){
alert("Product uploaded ✔");
loadProducts();
}else{
alert("Upload failed ❌");
}
}catch(e){
alert("Server error ❌");
}

btn.innerText="Upload Product";
btn.disabled=false;
}

/* ORDERS */
async function loadOrders(){

let res=await fetch(API+"/orders");
let data=await res.json();

document.getElementById("orders").innerHTML=
(data||[]).map(o=>`

<div class="card">

<h4>${o.fullName || ""}</h4>
<p>Status: ${o.status}</p>
<p>Payment: ${o.paymentMethod || ""}</p>
<p>Code: ${o.transactionCode || ""}</p>

<button class="status" onclick="updateStatus('${o._id}','Processing')">Processing</button>
<button class="status" onclick="updateStatus('${o._id}','Delivered')">Delivered</button>
<button class="del" onclick="deleteOrder('${o._id}')">Delete</button>

</div>

`).join("");

}

/* PRODUCTS */
async function loadProducts(){

let res=await fetch(API+"/products");
let data=await res.json();

document.getElementById("products").innerHTML=
(data||[]).map(p=>`

<div class="card">

<img src="${p.image}">
<h4>${p.name}</h4>
<p>KES ${p.price}</p>

<input id="p${p._id}" placeholder="new price">

<button class="edit" onclick="updatePrice('${p._id}')">Update</button>
<button class="del" onclick="deleteProduct('${p._id}')">Delete</button>

</div>

`).join("");

}

/* UPDATE PRICE */
function updatePrice(id){

let price=document.getElementById("p"+id).value;

fetch(API+"/product/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({price})
}).then(loadProducts);
}

/* DELETE PRODUCT */
function deleteProduct(id){
fetch(API+"/product/"+id,{method:"DELETE"}).then(loadProducts);
}

/* ORDER STATUS */
function updateStatus(id,status){
fetch(API+"/update-order-status/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({status})
}).then(loadOrders);
}

/* DELETE ORDER */
function deleteOrder(id){
fetch(API+"/order/"+id,{method:"DELETE"}).then(loadOrders);
}

/* INIT */
loadOrders();
loadProducts();

</script>

</body>
</html>
