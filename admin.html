<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
header{
background:linear-gradient(135deg,#2563eb,#38bdf8);
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* FORM */
.form{
padding:15px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#111827;
color:white;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* BUTTONS */
.add{
background:#22c55e;
color:white;
}

.update{
background:#2563eb;
color:white;
}

.delete{
background:#ef4444;
color:white;
}

/* PRODUCT LIST */
.list{
padding:10px;
}

.card{
background:#111827;
padding:10px;
margin:10px 0;
border-radius:12px;
display:flex;
gap:10px;
align-items:center;
}

.card img{
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
}

.small{
font-size:12px;
color:#9ca3af;
}

.actions{
flex:1;
}

.btn-row{
display:flex;
gap:5px;
margin-top:5px;
}

.btn-row button{
flex:1;
padding:8px;
font-size:12px;
}
</style>
</head>

<body>

<header>⚙️ Admin Panel</header>

<div class="form">

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">

<!-- IMAGE UPLOAD -->
<input type="file" id="imageFile">

<button class="add" onclick="addProduct()">Add Product</button>

<button class="update" onclick="updateProduct()">Update Selected</button>

</div>

<div class="list" id="list"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

let editId = null;

/* LOAD PRODUCTS */
function load(){
fetch(API + "/products")
.then(res=>res.json())
.then(data=>render(data));
}

load();

/* RENDER */
function render(products){

document.getElementById("list").innerHTML =
products.map(p=>{

let img = p.image;
if(img && !img.startsWith("http")){
img = API + "/uploads/" + img;
}

return `
<div class="card">

<img src="${img}">

<div class="actions">

<b>${p.name}</b><br>
<div class="small">KES ${p.price}</div>

<div class="btn-row">

<button class="update" onclick="edit('${p._id}','${p.name}','${p.price}')">
Edit
</button>

<button class="delete" onclick="removeProduct('${p._id}')">
Delete
</button>

</div>

</div>

</div>
`;
}).join("");

}

/* ADD PRODUCT (WITH IMAGE UPLOAD) */
function addProduct(){

let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let file = document.getElementById("imageFile").files[0];

if(!file){
alert("Select image");
return;
}

let formData = new FormData();
formData.append("name", name);
formData.append("price", price);
formData.append("image", file);

fetch(API + "/add-product-upload",{
method:"POST",
body:formData
})
.then(()=>load());

}

/* EDIT */
function edit(id,name,price){

editId = id;

document.getElementById("name").value = name;
document.getElementById("price").value = price;

}

/* UPDATE (WITH OPTIONAL IMAGE REPLACE) */
function updateProduct(){

let formData = new FormData();

formData.append("name", document.getElementById("name").value);
formData.append("price", document.getElementById("price").value);

let file = document.getElementById("imageFile").files[0];

if(file){
formData.append("image", file);
}

fetch(API + "/update-product-upload/" + editId,{
method:"PUT",
body:formData
})
.then(()=>load());

}

/* DELETE */
function removeProduct(id){

fetch(API + "/delete-product/" + id,{
method:"DELETE"
})
.then(()=>load());

}

</script>

</body>
</html>
