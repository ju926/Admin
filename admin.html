<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MALONE ADMIN</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER CENTER FIX */
header{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:15px;
background:linear-gradient(90deg,#2563eb,#dc2626);
font-size:20px;
font-weight:bold;
text-align:center;
}

header img{
width:40px;
height:40px;
border-radius:8px;
object-fit:cover;
}

/* LOGIN */
#loginBox{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

input{
padding:10px;
margin:6px;
width:260px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
outline:none;
}

input:focus{
border:1px solid #2563eb;
box-shadow:0 0 8px rgba(37,99,235,0.4);
}

/* BUTTONS BEAUTY */
button{
padding:10px 12px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:0.2s ease;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

button:hover{
transform:translateY(-2px);
opacity:0.95;
}

button:active{
transform:scale(0.96);
}

.edit{
background:linear-gradient(135deg,#f59e0b,#d97706);
color:white;
}

.del{
background:linear-gradient(135deg,#ef4444,#b91c1c);
color:white;
}

#uploadBtn{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
}

/* DASHBOARD */
.container{padding:10px}

/* ANALYTICS CENTER FIX */
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin:0 auto 15px auto;
max-width:1000px;
}

.stat{
background:linear-gradient(135deg,#2563eb,#1f2937);
padding:15px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

/* PRODUCTS GRID (RESPONSIVE) */
#products,#orders{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.card{
background:#111827;
padding:10px;
border-radius:10px;
box-sizing:border-box;
}

img{
width:100%;
height:120px;
object-fit:contain;
background:#000;
border-radius:8px;
display:block;
}

/* CHART */
canvas{
background:#111827;
padding:10px;
border-radius:10px;
margin-bottom:15px;
}

/* TABLET */
@media(max-width:1000px){
#products,#orders{
grid-template-columns:repeat(3,1fr);
}
}

/* MOBILE */
@media(max-width:600px){
#products,#orders{
grid-template-columns:repeat(2,1fr);
}
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
<img src="lg.png" onerror="this.style.display='none'">
MALONE ADMIN
</header>

<!-- LOGIN -->
<div id="loginBox">
<h2>Admin Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none" class="container">

<!-- ANALYTICS -->
<div id="analytics" class="stats"></div>

<!-- CHART -->
<div class="card">
<h3>📈 Sales Analytics</h3>
<canvas id="salesChart"></canvas>
</div>

<!-- UPLOAD PRODUCT (RESTORED) -->
<h3>➕ Add Product</h3>
<div class="card">

<input id="pname" placeholder="Product Name">
<input id="pprice" type="number" placeholder="Price">
<input type="file" id="pimage">

<button id="uploadBtn" onclick="uploadProduct()">Upload Product</button>

</div>

<h3>🛍 Products</h3>
<div id="products"></div>

<h3>📦 Orders</h3>
<div id="orders"></div>

<button onclick="logout()" class="del">Logout</button>

</div>

<script>

const API="https://phone-store-backend-9w7p.onrender.com";
let chart;

/* LOGIN */
async function login(){

let res=await fetch(API+"/admin-login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email.value,
password:pass.value
})
});

let data=await res.json();

if(data.token){
localStorage.setItem("adminToken",data.token);
loginBox.style.display="none";
dashboard.style.display="block";
loadAll();
}else{
alert("Login failed");
}

}

/* AUTO LOGIN */
function checkLogin(){

if(localStorage.getItem("adminToken")){
loginBox.style.display="none";
dashboard.style.display="block";
loadAll();
}else{
loginBox.style.display="flex";
dashboard.style.display="none";
}

}

checkLogin();

/* AUTH */
function auth(){
return {
"Authorization":"Bearer "+localStorage.getItem("adminToken"),
"Content-Type":"application/json"
};
}

/* LOAD ALL */
function loadAll(){
loadAnalytics();
loadProducts();
loadOrders();
}

/* UPLOAD PRODUCT (FIXED) */
async function uploadProduct(){

let btn=document.getElementById("uploadBtn");
btn.innerText="Uploading...";

let form=new FormData();
form.append("name",pname.value);
form.append("price",pprice.value);
form.append("image",pimage.files[0]);

await fetch(API+"/products",{
method:"POST",
headers:{
"Authorization":"Bearer "+localStorage.getItem("adminToken")
},
body:form
});

btn.innerText="Upload Product";

loadProducts();
}

/* ANALYTICS */
async function loadAnalytics(){

let [pRes,oRes]=await Promise.all([
fetch(API+"/products"),
fetch(API+"/orders",{headers:auth()})
]);

let products=await pRes.json();
let orders=await oRes.json();

let revenue=0;
let dailySales={};
let productSales={};

orders.forEach(o=>{

let date=new Date(o.date).toLocaleDateString();

if(!dailySales[date]) dailySales[date]=0;
dailySales[date]+=o.total || 0;

(o.items||[]).forEach(i=>{

if(!productSales[i.name]){
productSales[i.name]={qty:0,rev:0};
}

productSales[i.name].qty += i.quantity || 1;
productSales[i.name].rev += i.price*(i.quantity||1);

revenue += i.price*(i.quantity||1);

});

});

let best = Object.entries(productSales)
.sort((a,b)=>b[1].qty-a[1].qty)[0];

analytics.innerHTML=`
<div class="stat">💰 Revenue<br>KES ${revenue}</div>
<div class="stat">📦 Orders<br>${orders.length}</div>
<div class="stat">🛍 Products<br>${products.length}</div>
<div class="stat">🏆 Best<br>${best?best[0]:"None"}</div>
`;

/* CHART */
let labels=Object.keys(dailySales);
let values=Object.values(dailySales);

let ctx=document.getElementById("salesChart");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Sales (KES)",
data:values,
borderColor:"#2563eb",
backgroundColor:"rgba(37,99,235,0.2)",
tension:0.3
}]
},
options:{
responsive:true,
plugins:{legend:{labels:{color:"white"}}},
scales:{
x:{ticks:{color:"white"}},
y:{ticks:{color:"white"}}
}
}
});

}

/* PRODUCTS */
async function loadProducts(){

let res=await fetch(API+"/products");
let data=await res.json();

products.innerHTML=data.map(p=>`

<div class="card">

<img src="${p.image}">
<h4>${p.name}</h4>
<p>KES ${p.price}</p>

<input id="name${p._id}" placeholder="Edit name">
<button class="edit" onclick="updateName('${p._id}')">Edit Name</button>

<input id="price${p._id}" placeholder="Edit price">
<button class="edit" onclick="updatePrice('${p._id}')">Edit Price</button>

<button class="del" onclick="deleteProduct('${p._id}')">Delete</button>

</div>

`).join("");

}

/* UPDATE */
function updateName(id){
fetch(API+"/product/"+id,{
method:"PUT",
headers:auth(),
body:JSON.stringify({name:document.getElementById("name"+id).value})
}).then(loadProducts);
}

function updatePrice(id){
fetch(API+"/product/"+id,{
method:"PUT",
headers:auth(),
body:JSON.stringify({price:document.getElementById("price"+id).value})
}).then(loadProducts);
}

function deleteProduct(id){
fetch(API+"/product/"+id,{
method:"DELETE",
headers:auth()
}).then(loadProducts);
}

/* ORDERS */
async function loadOrders(){

let res=await fetch(API+"/orders",{headers:auth()});
let data=await res.json();

orders.innerHTML=data.map(o=>`
<div class="card">
<h4>${o.fullName}</h4>
<p>KES ${o.total}</p>
<p>${o.status}</p>
</div>
`).join("");

}

/* LOGOUT */
function logout(){
localStorage.removeItem("adminToken");
location.reload();
}

</script>

</body>
</html>
