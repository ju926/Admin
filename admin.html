<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

.order{
  background:#111827;
  margin:10px;
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:10px;
}

img{
  width:60px;
  height:60px;
  border-radius:8px;
}

button{
  padding:6px;
  margin:3px;
  border:none;
  border-radius:5px;
}

.approve{background:green;color:#fff;}
.reject{background:red;color:#fff;}
</style>
</head>

<body>

<h2 style="text-align:center">Admin Dashboard</h2>

<div id="orders"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

let orders = [];

function loadOrders(){
  fetch(API+"/orders")
  .then(r=>r.json())
  .then(data=>{
    orders = data;
    render();
  });
}

function render(){

  let html = "";

  orders.slice().reverse().forEach(o=>{

    html += `
      <div class="order">

        <img src="${o.cart?.[0]?.img || ''}">

        <div style="flex:1">
          <b>${o.method}</b><br>
          ${o.amount} KES<br>
          ${o.transactionId}<br>
          <small>${o.status}</small>
        </div>

        ${
          o.status==="pending"
          ? `
            <div>
              <button class="approve" onclick="update(${o.id},'approved')">A</button>
              <button class="reject" onclick="update(${o.id},'rejected')">R</button>
            </div>
          `
          : `<b>${o.status}</b>`
        }

      </div>
    `;
  });

  document.getElementById("orders").innerHTML = html;
}

function update(id,status){

  fetch(API+"/order-status",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id,status})
  })
  .then(()=>loadOrders());

}

setInterval(loadOrders,4000);
loadOrders();

</script>

</body>
</html>
