<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

header{
  background:#111827;
  padding:15px;
  text-align:center;
  color:#38bdf8;
}

.card{
  background:#111827;
  padding:12px;
  margin:10px;
  border-radius:10px;
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}

button{
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.add{background:#22c55e;color:#fff;}
.delete{background:#ef4444;color:#fff;}

.order{
  background:#111827;
  margin:10px;
  padding:12px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>📊 Admin Dashboard</header>

<!-- PRODUCT SECTION -->
<div class="card">
<h3>Add Product</h3>

<input id="pname" placeholder="Phone name">
<input id="pprice" placeholder="Price">
<input id="pimage" placeholder="Image URL">

<button class="add" onclick="addProduct()">Add Product</button>
</div>

<div id="productList"></div>

<hr>

<!-- ORDERS -->
<div id="orders"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* ================= PRODUCTS ================= */

function addProduct(){
fetch(API+"/add-product",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:pname.value,
price:pprice.value,
image:pimage.value
})
})
.then(()=>loadProducts());
}

function loadProducts(){

fetch(API+"/products")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(p=>{
html+=`
<div class="order">
<h3>${p.name}</h3>
<p>${p.price} KES</p>
<img src="${p.image}" width="80"><br>
<button class="delete" onclick="deleteProduct(${p.id})">Delete</button>
</div>`;
});

productList.innerHTML = html;

});
}

function deleteProduct(id){
fetch(API+"/delete-product",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id})
})
.then(()=>loadProducts());
}

/* ================= ORDERS ================= */

function loadOrders(){

fetch(API+"/orders")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(o=>{
html+=`
<div class="order">
<h3>${o.amount} KES</h3>
<p>${o.phone}</p>
<p>Status: ${o.status}</p>
</div>`;
});

orders.innerHTML = html;

});
}

/* INIT */
loadProducts();
loadOrders();

</script>

</body>
</html>
