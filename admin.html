<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Control Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

header{
  background:#111827;
  padding:15px;
  text-align:center;
  color:#38bdf8;
  font-size:18px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#111827;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.search{
  padding:10px;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
}

.order{
  background:#111827;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

img{
  width:60px;
  border-radius:8px;
}

button{
  margin:3px;
  padding:5px;
  border:none;
  border-radius:6px;
}

.approve{background:#22c55e;color:#fff;}
.reject{background:#ef4444;color:#fff;}

</style>
</head>

<body>

<header>📊 Admin Control Panel</header>

<!-- STATS -->
<div class="stats">
  <div class="card"><h3>Total Orders</h3><h2 id="total">0</h2></div>
  <div class="card"><h3>Pending</h3><h2 id="pending">0</h2></div>
  <div class="card"><h3>Approved</h3><h2 id="approved">0</h2></div>
  <div class="card"><h3>Revenue</h3><h2 id="revenue">0</h2></div>
</div>

<!-- SEARCH -->
<div class="search">
  <input id="search" placeholder="Search phone or transaction ID..." oninput="render()">
</div>

<!-- ORDERS -->
<div id="orders"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

if(localStorage.getItem("adminLoggedIn") !== "true"){
  window.location.href="index.html";
}

let orders = [];

/* LOAD */
function load(){

fetch(API+"/orders")
.then(r=>r.json())
.then(data=>{
  orders = data;
  stats();
  render();
});

}

/* STATS */
function stats(){

document.getElementById("total").innerText = orders.length;

document.getElementById("pending").innerText =
orders.filter(o=>o.status==="pending").length;

document.getElementById("approved").innerText =
orders.filter(o=>o.status==="approved").length;

document.getElementById("revenue").innerText =
orders.filter(o=>o.status==="approved")
.reduce((s,o)=>s+(o.amount||0),0);

}

/* RENDER */
function render(){

let q = document.getElementById("search").value.toLowerCase();

let html="";

orders.slice().reverse()
.filter(o =>
  o.transactionId.toLowerCase().includes(q) ||
  (o.phone||"").toLowerCase().includes(q)
)
.forEach(o=>{

let items = "";
let totalItems = 0;

(o.cart||[]).forEach(i=>{
  items += `${i.name} (x${i.quantity})<br>`;
  totalItems += i.quantity;
});

html+=`
<div class="order">

<h3>${o.method} - ${o.amount} KES</h3>

<p><b>Customer:</b> ${o.name || ""}</p>
<p><b>Phone:</b> ${o.phone || ""}</p>
<p><b>Location:</b> ${o.location || ""}</p>

<p><b>Transaction:</b> ${o.transactionId}</p>

<p><b>Items:</b><br>${items}</p>
<p><b>Total Items:</b> ${totalItems}</p>

<p><b>Status:</b> ${o.status}</p>
<p><b>Tracking:</b> ${o.tracking || ""}</p>

<div>

${
o.status==="pending"
? `
<button class="approve" onclick="act(${o.id},'approved')">Approve</button>
<button class="reject" onclick="act(${o.id},'rejected')">Reject</button>
`
: ""
}

</div>

</div>
`;
});

document.getElementById("orders").innerHTML = html;

}

/* ACTION */
function act(id,status){

fetch(API+"/order-status",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,status})
}).then(()=>load());

}

setInterval(load,5000);
load();

</script>

</body>
</html>
