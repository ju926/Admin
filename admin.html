<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

header{
  background:#111827;
  padding:15px;
  text-align:center;
  color:#38bdf8;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#111827;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.order{
  background:#111827;
  margin:10px;
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:10px;
}

img{
  width:60px;
  height:60px;
  border-radius:8px;
}

button{
  margin:3px;
  padding:5px;
  border:none;
  border-radius:6px;
}

.approve{background:#22c55e;color:#fff;}
.reject{background:#ef4444;color:#fff;}
</style>
</head>

<body>

<header>Admin Dashboard</header>

<div class="stats">
  <div class="card"><h3>Total</h3><h2 id="t">0</h2></div>
  <div class="card"><h3>Pending</h3><h2 id="p">0</h2></div>
  <div class="card"><h3>Revenue</h3><h2 id="r">0</h2></div>
</div>

<div id="orders"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

if(localStorage.getItem("adminLoggedIn") !== "true"){
  window.location.href="index.html";
}

function load(){

fetch(API+"/orders")
.then(r=>r.json())
.then(data=>{
  orders = data;
  render();
  stats();
});

}

function stats(){

  document.getElementById("t").innerText = orders.length;
  document.getElementById("p").innerText =
    orders.filter(o=>o.status==="pending").length;

  document.getElementById("r").innerText =
    orders.filter(o=>o.status==="approved")
    .reduce((s,o)=>s+(o.amount||0),0);

}

function render(){

let html="";

orders.slice().reverse().forEach(o=>{

html+=`
<div class="order">

<img src="${o.cart?.[0]?.img || "https://via.placeholder.com/60"}">

<div style="flex:1">
<b>${o.method}</b><br>
${o.amount} KES<br>
${o.transactionId}<br>
${o.status}<br>
${o.tracking || ""}
</div>

<div>
${
o.status==="pending"
? `
<button class="approve" onclick="act(${o.id},'approved')">✔</button>
<button class="reject" onclick="act(${o.id},'rejected')">✖</button>
`
: ""
}
</div>

</div>
`;
});

document.getElementById("orders").innerHTML = html;

}

function act(id,status){

fetch(API+"/order-status",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,status})
}).then(()=>load());

}

setInterval(load,4000);
load();

</script>

</body>
</html>
