<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
}

header{
background:linear-gradient(90deg,#1d4ed8,#ef4444);
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
padding:12px;
}

/* FORM */
.form{
background:#111827;
padding:12px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.add{background:#22c55e;color:#fff;}
.update{background:#1d4ed8;color:#fff;}
.delete{background:#ef4444;color:#fff;}

/* UPLOAD */
.upload{
display:block;
background:linear-gradient(90deg,#1d4ed8,#ef4444);
padding:12px;
text-align:center;
border-radius:8px;
margin-top:8px;
cursor:pointer;
font-weight:bold;
}

#preview{
width:100%;
height:150px;
object-fit:cover;
margin-top:10px;
border-radius:8px;
display:none;
}

/* PRODUCTS */
.card{
background:#111827;
margin-top:12px;
padding:10px;
border-radius:10px;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}
</style>
</head>

<body>

<header>🛠️ Admin Portal</header>

<div class="container">

<div class="form">

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">

<label class="upload">
📤 Upload Image
<input type="file" id="imageFile" accept="image/*" style="display:none;">
</label>

<img id="preview">

<button class="add" onclick="addProduct()">Add Product</button>

</div>

<h3>Products</h3>
<div id="list"></div>

</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

let imageBase64 = "";

/* IMAGE UPLOAD */
document.getElementById("imageFile").addEventListener("change", function(){
const file = this.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(e){
imageBase64 = e.target.result;

const preview = document.getElementById("preview");
preview.src = imageBase64;
preview.style.display = "block";
};

reader.readAsDataURL(file);
});

/* LOAD PRODUCTS */
async function loadProducts(){
const res = await fetch(API+"/products");
const data = await res.json();
render(data);
}

/* RENDER */
function render(products){

const list = document.getElementById("list");

list.innerHTML = products.map(p=>`
<div class="card">

<img src="${p.image || ''}">

<input id="n${p.id}" value="${p.name}">
<input id="p${p.id}" value="${p.price}">

<button class="update" onclick="update(${p.id})">Update</button>
<button class="delete" onclick="del(${p.id})">Delete</button>

</div>
`).join("");

}

/* ADD PRODUCT */
async function addProduct(){

const name = document.getElementById("name").value.trim();
const price = document.getElementById("price").value.trim();

if(!name || !price || !imageBase64){
alert("Fill all fields + upload image");
return;
}

await fetch(API+"/add-product",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
name,
price,
image: imageBase64
})
});

/* RESET */
document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("imageFile").value="";
document.getElementById("preview").style.display="none";
imageBase64="";

loadProducts();

}

/* UPDATE */
async function update(id){

const name = document.getElementById("n"+id).value.trim();
const price = document.getElementById("p"+id).value.trim();

await fetch(API+"/update-product/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
name,
price
})
});

loadProducts();

}

/* DELETE */
async function del(id){

await fetch(API+"/delete-product/"+id,{
method:"DELETE"
});

loadProducts();

}

/* INIT */
loadProducts();

</script>

</body>
</html>
