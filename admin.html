<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
}

/* HEADER */
header{
background:linear-gradient(90deg,#1d4ed8,#ef4444);
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* FORM */
.form{
padding:10px;
background:#111827;
margin:10px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.add{
background:#22c55e;
color:#fff;
}

/* PRODUCT LIST */
.list{
padding:10px;
}

.card{
background:#111827;
margin-top:10px;
padding:10px;
border-radius:10px;
}

img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

/* ACTION BUTTONS */
.edit{
background:#1d4ed8;
color:#fff;
}

.delete{
background:#ef4444;
color:#fff;
}
</style>
</head>

<body>

<header>🛠️ Admin Dashboard</header>

<!-- ADD PRODUCT -->
<div class="form">

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL or Base64">

<button class="add" onclick="addProduct()">Add Product</button>

</div>

<!-- PRODUCT LIST -->
<div class="list" id="list"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* LOAD PRODUCTS */
function loadProducts(){
fetch(API+"/products")
.then(r=>r.json())
.then(data=>{
render(data);
});
}

/* RENDER */
function render(products){

let html = "";

products.forEach(p=>{

html += `
<div class="card">

<img src="${p.image}">

<input id="name-${p.id}" value="${p.name}">
<input id="price-${p.id}" value="${p.price}">
<input id="image-${p.id}" value="${p.image}">

<button class="edit" onclick="updateProduct(${p.id})">Update</button>
<button class="delete" onclick="deleteProduct(${p.id})">Delete</button>

</div>
`;

});

list.innerHTML = html;
}

/* ADD PRODUCT */
function addProduct(){

fetch(API+"/add-product",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
name:name.value,
price:price.value,
image:image.value
})
})
.then(()=>loadProducts());

name.value="";
price.value="";
image.value="";
}

/* UPDATE PRODUCT */
function updateProduct(id){

fetch(API+"/update-product/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
name:document.getElementById("name-"+id).value,
price:document.getElementById("price-"+id).value,
image:document.getElementById("image-"+id).value
})
})
.then(()=>loadProducts());

}

/* DELETE PRODUCT */
function deleteProduct(id){

fetch(API+"/delete-product/"+id,{
method:"DELETE"
})
.then(()=>loadProducts());

}

/* INIT */
loadProducts();

</script>

</body>
</html>
