<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shopify Admin v2</title>

<!-- CHART LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
header{
padding:15px;
background:linear-gradient(90deg,#2563eb,#dc2626);
text-align:center;
font-size:20px;
font-weight:bold;
}

/* LOGIN */
#loginBox{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

input{
padding:10px;
margin:6px;
width:260px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.edit{background:#f59e0b}
.del{background:#ef4444;color:white}

/* DASHBOARD */
.container{padding:10px}

/* ANALYTICS CARDS */
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-bottom:15px;
}

.stat{
background:linear-gradient(135deg,#2563eb,#1f2937);
padding:15px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

/* GRID FIX */
#products,#orders{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
}

.card{
background:#111827;
padding:10px;
border-radius:10px;
}

img{
width:100%;
height:120px;
object-fit:contain;
background:#000;
border-radius:8px;
}

/* CHART */
canvas{
background:#111827;
padding:10px;
border-radius:10px;
margin-bottom:15px;
}

</style>
</head>

<body>

<header>📊 SHOPIFY ADMIN DASHBOARD v2</header>

<!-- LOGIN -->
<div id="loginBox">
<h2>Admin Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none" class="container">

<!-- ANALYTICS -->
<div id="analytics" class="stats"></div>

<!-- CHART -->
<div class="card">
<h3>📈 Sales Analytics</h3>
<canvas id="salesChart"></canvas>
</div>

<h3>🛍 Products</h3>
<div id="products"></div>

<h3>📦 Orders</h3>
<div id="orders"></div>

<button onclick="logout()" class="del">Logout</button>

</div>

<script>

const API="https://phone-store-backend-9w7p.onrender.com";
let chart;

/* ================= LOGIN ================= */
async function login(){

let res=await fetch(API+"/admin-login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email.value,
password:pass.value
})
});

let data=await res.json();

if(data.token){
localStorage.setItem("adminToken",data.token);
loginBox.style.display="none";
dashboard.style.display="block";
loadAll();
}else{
alert("Login failed");
}

}

/* ================= AUTO LOGIN ================= */
function checkLogin(){

if(localStorage.getItem("adminToken")){
loginBox.style.display="none";
dashboard.style.display="block";
loadAll();
}else{
loginBox.style.display="flex";
dashboard.style.display="none";
}

}

checkLogin();

/* ================= AUTH ================= */
function auth(){
return {
"Authorization":"Bearer "+localStorage.getItem("adminToken"),
"Content-Type":"application/json"
};
}

/* ================= LOAD ALL ================= */
function loadAll(){
loadAnalytics();
loadProducts();
loadOrders();
}

/* ================= SHOPIFY ANALYTICS v2 ================= */
async function loadAnalytics(){

let [pRes,oRes]=await Promise.all([
fetch(API+"/products"),
fetch(API+"/orders",{headers:auth()})
]);

let products=await pRes.json();
let orders=await oRes.json();

let revenue=0;
let dailySales={};
let productSales={};

orders.forEach(o=>{

let date=new Date(o.date).toLocaleDateString();

if(!dailySales[date]) dailySales[date]=0;
dailySales[date]+=o.total || 0;

(o.items||[]).forEach(i=>{

if(!productSales[i.name]){
productSales[i.name]={qty:0,rev:0};
}

productSales[i.name].qty += i.quantity || 1;
productSales[i.name].rev += i.price*(i.quantity||1);

revenue += i.price*(i.quantity||1);

});

});

let best = Object.entries(productSales)
.sort((a,b)=>b[1].qty-a[1].qty)[0];

/* STATS */
analytics.innerHTML=`
<div class="stat">💰 Revenue<br>KES ${revenue}</div>
<div class="stat">📦 Orders<br>${orders.length}</div>
<div class="stat">🛍 Products<br>${products.length}</div>
<div class="stat">🏆 Best Seller<br>${best?best[0]:"None"}</div>
`;

/* CHART */
let labels=Object.keys(dailySales);
let values=Object.values(dailySales);

let ctx=document.getElementById("salesChart");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Daily Sales (KES)",
data:values,
borderColor:"#2563eb",
backgroundColor:"rgba(37,99,235,0.2)",
tension:0.3
}]
},
options:{
responsive:true,
plugins:{
legend:{labels:{color:"white"}}
},
scales:{
x:{ticks:{color:"white"}},
y:{ticks:{color:"white"}}
}
}
});

}

/* ================= PRODUCTS ================= */
async function loadProducts(){

let res=await fetch(API+"/products");
let data=await res.json();

products.innerHTML=data.map(p=>`

<div class="card">

<img src="${p.image}">
<h4>${p.name}</h4>
<p>KES ${p.price}</p>

<input id="name${p._id}" placeholder="Edit name">
<button class="edit" onclick="updateName('${p._id}')">Edit Name</button>

<input id="price${p._id}" placeholder="Edit price">
<button class="edit" onclick="updatePrice('${p._id}')">Edit Price</button>

<button class="del" onclick="deleteProduct('${p._id}')">Delete</button>

</div>

`).join("");

}

/* UPDATE NAME */
function updateName(id){
fetch(API+"/product/"+id,{
method:"PUT",
headers:auth(),
body:JSON.stringify({
name:document.getElementById("name"+id).value
})
}).then(loadProducts);
}

/* UPDATE PRICE */
function updatePrice(id){
fetch(API+"/product/"+id,{
method:"PUT",
headers:auth(),
body:JSON.stringify({
price:document.getElementById("price"+id).value
})
}).then(loadProducts);
}

/* DELETE */
function deleteProduct(id){
fetch(API+"/product/"+id,{
method:"DELETE",
headers:auth()
}).then(loadProducts);
}

/* ================= ORDERS ================= */
async function loadOrders(){

let res=await fetch(API+"/orders",{headers:auth()});
let data=await res.json();

orders.innerHTML=data.map(o=>`
<div class="card">
<h4>${o.fullName}</h4>
<p>KES ${o.total}</p>
<p>${o.status}</p>
</div>
`).join("");

}

/* ================= LOGOUT ================= */
function logout(){
localStorage.removeItem("adminToken");
location.reload();
}

</script>

</body>
</html>
