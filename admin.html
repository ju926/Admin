<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
header{
background:linear-gradient(135deg,#2563eb,#38bdf8);
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* FORM */
.form{
padding:15px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#111827;
color:white;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* BUTTONS */
.add{
background:#22c55e;
color:white;
}

.update{
background:#2563eb;
color:white;
}

.delete{
background:#ef4444;
color:white;
}

/* PRODUCT LIST */
.list{
padding:10px;
}

.card{
background:#111827;
padding:10px;
margin:10px 0;
border-radius:12px;
display:flex;
gap:10px;
align-items:center;
}

.card img{
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
}

.actions{
flex:1;
}

.small{
font-size:12px;
color:#9ca3af;
}

.btn-row{
display:flex;
gap:5px;
margin-top:5px;
}

.btn-row button{
flex:1;
padding:8px;
font-size:12px;
}
</style>
</head>

<body>

<header>⚙️ Admin Panel</header>

<div class="form">

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">

<button class="add" onclick="addProduct()">Add Product</button>

</div>

<div class="list" id="list"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

let editId = null;

/* LOAD PRODUCTS */
function load(){
fetch(API + "/products")
.then(res=>res.json())
.then(data=>{
render(data);
});
}

load();

/* RENDER */
function render(products){

let html = "";

products.forEach(p=>{
html += `
<div class="card">

<img src="${p.image}">

<div class="actions">

<div><b>${p.name}</b></div>
<div class="small">KES ${p.price}</div>

<div class="btn-row">

<button class="update" onclick="edit('${p._id}','${p.name}','${p.price}','${p.image}')">
Edit
</button>

<button class="delete" onclick="removeProduct('${p._id}')">
Delete
</button>

</div>

</div>

</div>
`;
});

document.getElementById("list").innerHTML = html;
}

/* ADD PRODUCT */
function addProduct(){

const name = document.getElementById("name").value;
const price = document.getElementById("price").value;
const image = document.getElementById("image").value;

fetch(API + "/add-product",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,price,image})
})
.then(res=>res.json())
.then(()=>{
clear();
load();
});

}

/* EDIT */
function edit(id,name,price,image){

editId = id;

document.getElementById("name").value = name;
document.getElementById("price").value = price;
document.getElementById("image").value = image;

}

/* UPDATE */
function updateProduct(){

fetch(API + "/update-product/" + editId,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:document.getElementById("name").value,
price:document.getElementById("price").value,
image:document.getElementById("image").value
})
})
.then(()=>load());

}

/* DELETE */
function removeProduct(id){

fetch(API + "/delete-product/" + id,{
method:"DELETE"
})
.then(()=>load());

}

/* CLEAR */
function clear(){
document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("image").value="";
}

</script>

</body>
</html>
