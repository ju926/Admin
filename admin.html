<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
}

header{
background:linear-gradient(90deg,#1d4ed8,#ef4444);
padding:15px;
text-align:center;
font-weight:bold;
font-size:20px;
}

.container{
padding:10px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
outline:none;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.add{
background:#22c55e;
color:#fff;
}

/* IMAGE UPLOAD */
.upload{
background:linear-gradient(90deg,#1d4ed8,#ef4444);
color:#fff;
padding:12px;
border-radius:8px;
text-align:center;
cursor:pointer;
margin-top:8px;
font-weight:bold;
}

#preview{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
margin-top:10px;
display:none;
}

/* PRODUCT LIST */
.card{
background:#111827;
margin-top:10px;
padding:10px;
border-radius:10px;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.edit{
background:#1d4ed8;
color:#fff;
}

.delete{
background:#ef4444;
color:#fff;
}
</style>
</head>

<body>

<header>🛠️ Admin Dashboard</header>

<div class="container">

<!-- INPUTS -->
<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">

<!-- IMAGE UPLOAD -->
<label class="upload">
📤 Upload Image
<input type="file" id="imageFile" accept="image/*" style="display:none;">
</label>

<img id="preview">

<button class="add" onclick="addProduct()">Add Product</button>

<h3>Products</h3>
<div id="list"></div>

</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

let imageBase64 = "";

/* IMAGE HANDLER */
document.getElementById("imageFile").addEventListener("change", function(){

const file = this.files[0];
const reader = new FileReader();

reader.onload = function(e){

imageBase64 = e.target.result;

const img = document.getElementById("preview");
img.src = imageBase64;
img.style.display = "block";

};

reader.readAsDataURL(file);

});

/* LOAD PRODUCTS */
function loadProducts(){

fetch(API+"/products")
.then(r=>r.json())
.then(render);

}

/* RENDER PRODUCTS */
function render(products){

list.innerHTML = products.map(p=>`
<div class="card">

<img src="${p.image || ''}">

<input id="n${p.id}" value="${p.name || ''}">
<input id="p${p.id}" value="${p.price || ''}">

<button class="edit" onclick="update(${p.id})">Update</button>
<button class="delete" onclick="del(${p.id})">Delete</button>

</div>
`).join("");

}

/* ADD PRODUCT (FIX FOR UNDEFINED ISSUE) */
function addProduct(){

const nameValue = document.getElementById("name").value.trim();
const priceValue = document.getElementById("price").value.trim();

if(!nameValue || !priceValue || !imageBase64){
alert("Fill all fields + upload image");
return;
}

fetch(API+"/add-product",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
name: nameValue,
price: priceValue,
image: imageBase64
})
})
.then(()=>loadProducts());

document.getElementById("name").value = "";
document.getElementById("price").value = "";
document.getElementById("imageFile").value = "";
document.getElementById("preview").style.display = "none";
imageBase64 = "";

}

/* UPDATE */
function update(id){

fetch(API+"/update-product/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
name: document.getElementById("n"+id).value,
price: document.getElementById("p"+id).value,
image: imageBase64 || ""
})
})
.then(()=>loadProducts());

}

/* DELETE */
function del(id){

fetch(API+"/delete-product/"+id,{
method:"DELETE"
})
.then(()=>loadProducts());

}

/* INIT */
loadProducts();

</script>

</body>
</html>
