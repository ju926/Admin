<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
padding:15px;
background:linear-gradient(90deg,#2563eb,#dc2626);
text-align:center;
font-size:20px;
font-weight:bold;
}

/* LOGIN */
#loginBox{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

input{
padding:10px;
margin:5px;
width:250px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.edit{background:#f59e0b}
.del{background:#ef4444;color:white}

/* GRID */
.container{padding:10px}

#products,#orders{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.card{
background:#111827;
padding:10px;
border-radius:10px;
}

img{
width:100%;
height:120px;
object-fit:contain;
background:#000;
border-radius:8px;
}

</style>
</head>

<body>

<header>🔐 ADMIN PANEL</header>

<!-- LOGIN -->
<div id="loginBox">
<h2>Admin Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none" class="container">

<h3>🛍 Products</h3>
<div id="products"></div>

<h3>📦 Orders</h3>
<div id="orders"></div>

</div>

<script>

const API="https://phone-store-backend-9w7p.onrender.com";

/* LOGIN */
async function login(){

let res = await fetch(API+"/admin-login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:document.getElementById("email").value,
password:document.getElementById("pass").value
})
});

let data = await res.json();

if(data.token){
localStorage.setItem("adminToken",data.token);
document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";
loadAll();
}else{
alert("Login failed");
}

}

/* AUTH HEADER */
function auth(){
return {
"Authorization":"Bearer "+localStorage.getItem("adminToken"),
"Content-Type":"application/json"
};
}

/* LOAD ALL */
function loadAll(){
loadProducts();
loadOrders();
}

/* PRODUCTS */
async function loadProducts(){

let res = await fetch(API+"/products");
let data = await res.json();

document.getElementById("products").innerHTML =
data.map(p=>`

<div class="card">

<img src="${p.image}">
<h4>${p.name}</h4>
<p>KES ${p.price}</p>

<input id="name${p._id}" placeholder="New name">
<button class="edit" onclick="updateName('${p._id}')">Edit Name</button>

<input id="price${p._id}" placeholder="New price">
<button class="edit" onclick="updatePrice('${p._id}')">Edit Price</button>

<button class="del" onclick="deleteProduct('${p._id}')">Delete</button>

</div>

`).join("");

}

/* UPDATE NAME */
function updateName(id){

fetch(API+"/product/"+id,{
method:"PUT",
headers:auth(),
body:JSON.stringify({
name:document.getElementById("name"+id).value
})
}).then(loadProducts);

}

/* UPDATE PRICE */
function updatePrice(id){

fetch(API+"/product/"+id,{
method:"PUT",
headers:auth(),
body:JSON.stringify({
price:document.getElementById("price"+id).value
})
}).then(loadProducts);

}

/* DELETE */
function deleteProduct(id){

fetch(API+"/product/"+id,{
method:"DELETE",
headers:auth()
}).then(loadProducts);

}

/* ORDERS */
async function loadOrders(){

let res = await fetch(API+"/orders",{
headers:{
"Authorization":"Bearer "+localStorage.getItem("adminToken")
}
});

let data = await res.json();

document.getElementById("orders").innerHTML =
data.map(o=>`

<div class="card">
<h4>${o.fullName}</h4>
<p>${o.total}</p>
<p>${o.status}</p>
</div>

`).join("");

}

</script>

</body>
</html>
