<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

header{
  padding:20px;
  text-align:center;
  background:#111827;
  font-size:20px;
  font-weight:bold;
  color:#38bdf8;
}

.stats{
  display:flex;
  justify-content:space-around;
  padding:15px;
  flex-wrap:wrap;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin:10px;
  flex:1;
  min-width:120px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.08);
}

.orders{
  padding:15px;
}

.order{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  gap:15px;
  align-items:center;
  border:1px solid rgba(255,255,255,0.08);
}

.order img{
  width:80px;
  height:80px;
  border-radius:10px;
  object-fit:cover;
}

.info{
  flex:1;
}

.status{
  font-size:12px;
  padding:4px 8px;
  border-radius:6px;
  display:inline-block;
}

.pending{background:#f59e0b;}
.approved{background:#22c55e;}
.rejected{background:#ef4444;}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:2px;
}

.approve{background:#22c55e;color:#fff;}
.reject{background:#ef4444;color:#fff;}
</style>
</head>

<body>

<header>📊 Admin Dashboard</header>

<!-- STATS -->
<div class="stats">
  <div class="card">
    <h3 id="totalOrders">0</h3>
    <p>Total Orders</p>
  </div>

  <div class="card">
    <h3 id="pending">0</h3>
    <p>Pending</p>
  </div>

  <div class="card">
    <h3 id="revenue">0</h3>
    <p>Revenue</p>
  </div>
</div>

<!-- ORDERS -->
<div class="orders" id="orders"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

let allOrders = [];

/* LOAD ORDERS */
function loadOrders(){
  fetch(API + "/orders")
  .then(res => res.json())
  .then(data => {
    allOrders = data;
    render();
    updateStats();
  });
}

/* RENDER ORDERS */
function render(){

  let html = "";

  allOrders.reverse().forEach(order => {

    let items = order.cart.map(p =>
      `<img src="${p.img}" onerror="this.src='https://via.placeholder.com/80'">`
    ).join("");

    html += `
      <div class="order">

        ${items}

        <div class="info">
          <b>${order.method}</b><br>
          💰 KES ${order.amount}<br>
          🆔 ${order.transactionId}<br>
          ⏰ ${order.time}<br>

          <span class="status ${order.status}">
            ${order.status}
          </span>
        </div>

        ${
          order.status === "pending"
          ? `
            <div>
              <button class="approve" onclick="update('${order._id}','approved')">Approve</button>
              <button class="reject" onclick="update('${order._id}','rejected')">Reject</button>
            </div>
          `
          : `<b>${order.status.toUpperCase()}</b>`
        }

      </div>
    `;
  });

  document.getElementById("orders").innerHTML = html;
}

/* UPDATE STATUS */
function update(id,status){

  fetch(API + "/order-status", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id,status})
  })
  .then(() => loadOrders());

}

/* STATS */
function updateStats(){

  document.getElementById("totalOrders").innerText = allOrders.length;

  document.getElementById("pending").innerText =
    allOrders.filter(o => o.status === "pending").length;

  document.getElementById("revenue").innerText =
    allOrders
    .filter(o => o.status === "approved")
    .reduce((a,b)=>a + b.amount,0);

}

/* AUTO REFRESH */
setInterval(loadOrders,5000);
loadOrders();

</script>

</body>
</html>
