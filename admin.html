<!DOCTYPE html>
<html>
<head>
<title>Admin Upload</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:linear-gradient(135deg,#2563eb,#38bdf8);
padding:15px;
text-align:center;
font-weight:bold;
}

.form{
padding:15px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#111827;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.add{
background:#22c55e;
color:white;
}

.card{
background:#111827;
padding:10px;
margin:10px;
border-radius:12px;
display:flex;
gap:10px;
}

.card img{
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
}
</style>
</head>

<body>

<header>⚙️ Admin Upload Panel</header>

<div class="form">

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">

<!-- FILE UPLOAD (NEW) -->
<input type="file" id="imageFile">

<button class="add" onclick="uploadProduct()">Upload Product</button>

</div>

<div id="list"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* LOAD PRODUCTS */
function load(){
fetch(API + "/products")
.then(res=>res.json())
.then(data=>{
document.getElementById("list").innerHTML =
data.map(p=>`
<div class="card">
<img src="${p.image}">
<div>
<b>${p.name}</b><br>
KES ${p.price}
</div>
</div>
`).join('');
});
}

load();

/* UPLOAD PRODUCT */
async function uploadProduct(){

const name = document.getElementById("name").value;
const price = document.getElementById("price").value;
const file = document.getElementById("imageFile").files[0];

if(!file){
alert("Select image first");
return;
}

/* SEND FILE TO BACKEND */
let formData = new FormData();
formData.append("image", file);
formData.append("name", name);
formData.append("price", price);

let res = await fetch(API + "/add-product-upload", {
method: "POST",
body: formData
});

let data = await res.json();

alert("Uploaded ✔");
load();

}

</script>

</body>
</html>
