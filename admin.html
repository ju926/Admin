<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

header{
  background:#111827;
  padding:15px;
  text-align:center;
  color:#38bdf8;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#111827;
  padding:12px;
  border-radius:10px;
  text-align:center;
}

.chart{
  margin:15px;
  background:#111827;
  padding:15px;
  border-radius:10px;
}

.bar{
  height:20px;
  margin:5px 0;
  border-radius:5px;
}

.pendingBar{background:#facc15;}
.approvedBar{background:#22c55e;}

.order{
  background:#111827;
  margin:10px;
  padding:12px;
  border-radius:10px;
}

button{
  padding:6px 10px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.approve{background:#22c55e;color:#fff;}
.reject{background:#ef4444;color:#fff;}

select{
  margin-top:5px;
  padding:5px;
}
</style>
</head>

<body>

<header>📊 Admin Dashboard</header>

<!-- STATS -->
<div class="stats">
  <div class="card">
    <h3>Total</h3>
    <h2 id="total">0</h2>
  </div>

  <div class="card">
    <h3>Pending</h3>
    <h2 id="pending">0</h2>
  </div>

  <div class="card">
    <h3>Revenue</h3>
    <h2 id="revenue">0</h2>
  </div>
</div>

<!-- CHART -->
<div class="chart">
  <h3>Order Status Overview</h3>
  <p>Pending</p>
  <div id="pendingBar" class="bar pendingBar"></div>

  <p>Approved</p>
  <div id="approvedBar" class="bar approvedBar"></div>
</div>

<div id="orders"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

let orders = [];

function load(){

fetch(API+"/orders")
.then(res=>res.json())
.then(data=>{

orders = data.filter(o => o.status !== "rejected");

updateStats();
render();

});

}

function updateStats(){

let total = orders.length;
let pending = orders.filter(o=>o.status==="pending").length;
let approved = orders.filter(o=>o.status==="approved").length;

let revenue = orders
.filter(o=>o.status==="approved")
.reduce((sum,o)=>sum+(o.amount||0),0);

document.getElementById("total").innerText = total;
document.getElementById("pending").innerText = pending;
document.getElementById("revenue").innerText = revenue;

/* UPDATE BARS */
document.getElementById("pendingBar").style.width = (pending*20)+"px";
document.getElementById("approvedBar").style.width = (approved*20)+"px";

}

function render(){

let html = "";

orders.slice().reverse().forEach(o=>{

html += `
<div class="order">

<h3>${o.amount} KES</h3>

<p>${o.phone}</p>
<p>${o.location}</p>

<p>Status: ${o.status}</p>

<select onchange="updateTracking(${o.id}, this.value)">
  <option ${o.tracking==="Order placed"?"selected":""}>Order placed</option>
  <option ${o.tracking==="Processing"?"selected":""}>Processing</option>
  <option ${o.tracking==="Shipped"?"selected":""}>Shipped</option>
  <option ${o.tracking==="Delivered"?"selected":""}>Delivered</option>
</select>

<br><br>

${
o.status==="pending"
? `
<button class="approve" onclick="updateStatus(${o.id},'approved')">Approve</button>
<button class="reject" onclick="updateStatus(${o.id},'rejected')">Reject</button>
`
: ""
}

</div>
`;
});

document.getElementById("orders").innerHTML = html;

}

function updateStatus(id,status){

fetch(API+"/order-status",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,status})
})
.then(()=>load());

}

function updateTracking(id,tracking){

fetch(API+"/tracking",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,tracking})
})
.then(()=>load());

}

setInterval(load,5000);
load();

</script>

</body>
</html>
