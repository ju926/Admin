<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

/* HEADER */
header{
  padding:20px;
  text-align:center;
  background:#111827;
  color:#38bdf8;
  font-size:20px;
  font-weight:bold;
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  padding:15px;
}

.card{
  flex:1;
  min-width:120px;
  background:#111827;
  padding:15px;
  border-radius:12px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.08);
}

.card h3{
  margin:5px 0;
}

/* SEARCH */
.search{
  padding:0 15px;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-bottom:10px;
}

/* FILTER */
.filters{
  display:flex;
  gap:10px;
  padding:0 15px 10px;
}

.filters button{
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#1f2937;
  color:#fff;
}

/* ORDERS */
.order{
  background:#111827;
  margin:10px 15px;
  padding:12px;
  border-radius:12px;
  display:flex;
  gap:10px;
  align-items:center;
  border:1px solid rgba(255,255,255,0.08);
}

.order img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}

.info{
  flex:1;
  font-size:13px;
}

.status{
  padding:3px 8px;
  border-radius:6px;
  font-size:11px;
}

.pending{background:#f59e0b;}
.approved{background:#22c55e;}
.rejected{background:#ef4444;}

/* BUTTONS */
button{
  padding:5px 8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.approve{background:#22c55e;color:#fff;}
.reject{background:#ef4444;color:#fff;}
.view{background:#3b82f6;color:#fff;margin-right:5px;}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
}

.modal-content{
  background:#111827;
  width:90%;
  max-width:400px;
  margin:80px auto;
  padding:15px;
  border-radius:12px;
}
</style>
</head>

<body>

<header>📊 Admin Dashboard Pro</header>

<!-- STATS -->
<div class="stats">
  <div class="card"><h3 id="total">0</h3><p>Total Orders</p></div>
  <div class="card"><h3 id="pending">0</h3><p>Pending</p></div>
  <div class="card"><h3 id="approved">0</h3><p>Approved</p></div>
  <div class="card"><h3 id="revenue">0</h3><p>Revenue</p></div>
</div>

<!-- SEARCH -->
<div class="search">
  <input id="search" placeholder="Search transaction ID..." oninput="render()">
</div>

<!-- FILTER -->
<div class="filters">
  <button onclick="setFilter('all')">All</button>
  <button onclick="setFilter('pending')">Pending</button>
  <button onclick="setFilter('approved')">Approved</button>
  <button onclick="setFilter('rejected')">Rejected</button>
</div>

<!-- ORDERS -->
<div id="orders"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Order Details</h3>
    <div id="details"></div>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

let orders = [];
let filter = "all";

/* LOAD */
function load(){
  fetch(API + "/orders")
  .then(res => res.json())
  .then(data => {
    orders = data;
    render();
    stats();
  });
}

/* STATS */
function stats(){
  document.getElementById("total").innerText = orders.length;
  document.getElementById("pending").innerText = orders.filter(o=>o.status==="pending").length;
  document.getElementById("approved").innerText = orders.filter(o=>o.status==="approved").length;

  let revenue = orders
    .filter(o=>o.status==="approved")
    .reduce((a,b)=>a+b.amount,0);

  document.getElementById("revenue").innerText = revenue;
}

/* FILTER */
function setFilter(f){
  filter = f;
  render();
}

/* RENDER */
function render(){

  let search = document.getElementById("search").value.toLowerCase();

  let list = orders.filter(o=>{

    let matchFilter = filter==="all" || o.status===filter;
    let matchSearch = o.transactionId.toLowerCase().includes(search);

    return matchFilter && matchSearch;
  });

  let html = "";

  list.reverse().forEach(o=>{

    let img = o.cart[0]?.img || "";

    html += `
      <div class="order">

        <img src="${img}" onerror="this.src='https://via.placeholder.com/70'">

        <div class="info">
          <b>${o.method}</b><br>
          💰 ${o.amount} KES<br>
          🆔 ${o.transactionId}<br>

          <span class="status ${o.status}">
            ${o.status}
          </span>
        </div>

        <div>
          <button class="view" onclick='view(${JSON.stringify(o)})'>View</button>

          ${o.status==="pending" ? `
            <button class="approve" onclick="update('${o._id}','approved')">✔</button>
            <button class="reject" onclick="update('${o._id}','rejected')">✖</button>
          ` : ""}
        </div>

      </div>
    `;
  });

  document.getElementById("orders").innerHTML = html;
}

/* UPDATE STATUS */
function update(id,status){

  fetch(API+"/order-status",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id,status})
  }).then(load);

}

/* VIEW DETAILS */
function view(order){

  document.getElementById("modal").style.display="block";

  let items = order.cart.map(p=>
    `<p>${p.name} x${p.quantity} - ${p.price}</p>`
  ).join("");

  document.getElementById("details").innerHTML = `
    <p><b>Method:</b> ${order.method}</p>
    <p><b>TX ID:</b> ${order.transactionId}</p>
    <p><b>Amount:</b> ${order.amount}</p>
    <p><b>Status:</b> ${order.status}</p>
    <hr>
    <h4>Items</h4>
    ${items}
  `;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* AUTO REFRESH */
setInterval(load,5000);
load();

</script>

</body>
</html>
