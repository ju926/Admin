<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}
header{padding:15px;background:#2563eb;text-align:center;font-size:20px}

.container{padding:10px}

.card{
background:#111827;
padding:10px;
margin:10px 0;
border-radius:10px
}

button{
padding:6px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer
}

.del{background:#ef4444;color:white}
.edit{background:#f59e0b;color:white}
.status{background:#22c55e;color:white}

input{
padding:8px;
margin:5px 0;
width:100%;
border:none;
border-radius:8px
}

img{
width:100%;
height:120px;
object-fit:contain;
background:#000
}
</style>

</head>

<body>

<header>🛠 Admin Dashboard</header>

<div class="container">

<!-- ================= ADD PRODUCT ================= -->
<h3>➕ Add Product</h3>

<div class="card">

<input id="pname" placeholder="Phone Name">
<input id="pprice" type="number" placeholder="Price">
<input type="file" id="pimage">

<button onclick="uploadProduct()">Upload Product</button>

</div>

<!-- ================= ORDERS ================= -->
<h3>📦 Orders</h3>
<div id="orders">Loading...</div>

<!-- ================= PRODUCTS ================= -->
<h3>🛍 Products</h3>
<div id="products">Loading...</div>

</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* ================= UPLOAD PRODUCT ================= */
function uploadProduct(){

let name = document.getElementById("pname").value;
let price = document.getElementById("pprice").value;
let file = document.getElementById("pimage").files[0];

if(!name || !price || !file){
alert("Fill all fields");
return;
}

let formData = new FormData();
formData.append("name", name);
formData.append("price", price);
formData.append("image", file);

fetch(API + "/products", {
method:"POST",
body:formData
})
.then(res=>res.json())
.then(()=>{
alert("Product uploaded ✔");
loadProducts();
});

}

/* ================= ORDERS ================= */
function loadOrders(){

fetch(API+"/orders")
.then(r=>r.json())
.then(data=>{

document.getElementById("orders").innerHTML =
(data||[]).map(o=>`

<div class="card">

<h3>${o.fullName || ""}</h3>
<p>Status: ${o.status}</p>

<button class="status" onclick="updateStatus('${o._id}','Processing')">Processing</button>
<button class="status" onclick="updateStatus('${o._id}','Delivered')">Delivered</button>
<button class="del" onclick="deleteOrder('${o._id}')">Delete</button>

</div>

`).join("");

});

}

function updateStatus(id,status){

fetch(API+"/update-order-status/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({status})
})
.then(()=>loadOrders());

}

function deleteOrder(id){

fetch(API+"/order/"+id,{method:"DELETE"})
.then(()=>loadOrders());

}

/* ================= PRODUCTS ================= */
function loadProducts(){

fetch(API+"/products")
.then(r=>r.json())
.then(data=>{

document.getElementById("products").innerHTML =
(data||[]).map(p=>`

<div class="card">

<img src="${API}/uploads/${p.image}">

<h4>${p.name}</h4>
<p>KES ${p.price}</p>

<input id="p${p._id}" placeholder="new price">

<button class="edit" onclick="updatePrice('${p._id}')">Update Price</button>
<button class="del" onclick="deleteProduct('${p._id}')">Delete</button>

</div>

`).join("");

});

}

function updatePrice(id){

let price = document.getElementById("p"+id).value;

fetch(API+"/product/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({price})
})
.then(()=>loadProducts());

}

function deleteProduct(id){

fetch(API+"/product/"+id,{method:"DELETE"})
.then(()=>loadProducts());

}

/* ================= INIT ================= */
loadOrders();
loadProducts();

</script>

</body>
</html>
