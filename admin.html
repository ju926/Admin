<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}
header{padding:15px;background:#2563eb;text-align:center;font-size:20px}

.container{padding:10px}

.card{
background:#111827;
padding:10px;
margin:10px 0;
border-radius:10px
}

button{
padding:6px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer
}

.del{background:#ef4444;color:white}
.edit{background:#f59e0b;color:white}
.status{background:#22c55e;color:white}

input{
padding:8px;
margin:5px 0;
width:100%;
border:none;
border-radius:8px
}

img{
width:100%;
height:120px;
object-fit:contain;
background:#000
}
</style>

</head>

<body>

<header>🛠 Admin Dashboard</header>

<div class="container">

<h3>➕ Add Product</h3>

<div class="card">

<input id="pname" placeholder="Phone Name">
<input id="pprice" type="number" placeholder="Price">
<input type="file" id="pimage">

<button onclick="uploadProduct()" id="uploadBtn">Upload Product</button>

</div>

<h3>📦 Orders</h3>
<div id="orders">Loading...</div>

<h3>🛍 Products</h3>
<div id="products">Loading...</div>

</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* ================= UPLOAD PRODUCT ================= */
async function uploadProduct(){

let btn = document.getElementById("uploadBtn");
btn.innerText = "Uploading...";
btn.disabled = true;

let name = document.getElementById("pname").value;
let price = document.getElementById("pprice").value;
let file = document.getElementById("pimage").files[0];

if(!name || !price || !file){
alert("Fill all fields");
btn.innerText = "Upload Product";
btn.disabled = false;
return;
}

let formData = new FormData();
formData.append("name", name);
formData.append("price", price);
formData.append("image", file);

try{

let res = await fetch(API + "/products", {
method:"POST",
body:formData
});

if(res.ok){
alert("Product uploaded ✔");
loadProducts();
}else{
alert("Upload failed ❌");
}

}catch(err){
console.log(err);
alert("Server error ❌");
}

btn.innerText = "Upload Product";
btn.disabled = false;
}

/* ================= ORDERS ================= */
async function loadOrders(){

let res = await fetch(API+"/orders");
let data = await res.json();

document.getElementById("orders").innerHTML =
(data||[]).map(o=>`

<div class="card">

<h3>${o.fullName || ""}</h3>
<p>Status: ${o.status}</p>
<p>Payment: ${o.paymentMethod || ""}</p>
<p>Code: ${o.transactionCode || ""}</p>

<button class="status" onclick="updateStatus('${o._id}','Processing')">Processing</button>
<button class="status" onclick="updateStatus('${o._id}','Delivered')">Delivered</button>

<!-- DELETE ORDER -->
<button class="del" onclick="deleteOrder('${o._id}')">Delete Order</button>

</div>

`).join("");

}

/* UPDATE ORDER STATUS */
function updateStatus(id,status){

fetch(API+"/update-order-status/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({status})
})
.then(()=>loadOrders());

}

/* DELETE ORDER (FIXED) */
function deleteOrder(id){

if(!confirm("Delete this order?")) return;

fetch(API+"/order/"+id,{
method:"DELETE"
})
.then(res=>res.json())
.then(()=>{
loadOrders();
});

}

/* ================= PRODUCTS ================= */
async function loadProducts(){

let res = await fetch(API+"/products");
let data = await res.json();

document.getElementById("products").innerHTML =
(data||[]).map(p=>`

<div class="card">

<img src="${p.image}">

<h4>${p.name}</h4>
<p>KES ${p.price}</p>

<input id="p${p._id}" placeholder="new price">

<button class="edit" onclick="updatePrice('${p._id}')">Update Price</button>

<!-- DELETE PRODUCT -->
<button class="del" onclick="deleteProduct('${p._id}')">Delete Product</button>

</div>

`).join("");

}

/* UPDATE PRICE */
function updatePrice(id){

let price = document.getElementById("p"+id).value;

fetch(API+"/product/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({price})
})
.then(()=>loadProducts());

}

/* DELETE PRODUCT */
function deleteProduct(id){

if(!confirm("Delete this product?")) return;

fetch(API+"/product/"+id,{
method:"DELETE"
})
.then(res=>res.json())
.then(()=>{
loadProducts();
});

}

/* AUTO REFRESH */
setInterval(()=>{
loadOrders();
loadProducts();
},10000);

/* INIT */
loadOrders();
loadProducts();

</script>

</body>
</html>
