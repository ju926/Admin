<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h2{
  color:#38bdf8;
}

.card{
  background:#111827;
  padding:15px;
  margin:15px 0;
  border-radius:12px;
  display:flex;
  gap:15px;
}

img{
  width:100px;
  height:100px;
  border-radius:10px;
  object-fit:cover;
}

.status{
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
}

.pending{background:yellow;color:black;}
.approved{background:green;}
.rejected{background:red;}

button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.approve{background:green;color:white;}
.reject{background:red;color:white;}

.logout{
  background:red;
  color:white;
  padding:8px 12px;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
  <h2>📦 Admin Orders</h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div id="orders">Loading...</div>

</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* PROTECT PAGE */
if(!localStorage.getItem("adminToken")){
  window.location.href = "admin-login.html";
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("adminToken");
  window.location.href = "admin-login.html";
}

/* LOAD ORDERS */
function loadOrders(){

  fetch(API + "/orders", {
    headers:{
      "Authorization": localStorage.getItem("adminToken")
    }
  })
  .then(res => res.json())
  .then(data => {

    let box = document.getElementById("orders");
    box.innerHTML = "";

    data.reverse().forEach(order => {

      let item = order.cart?.[0] || {};

      box.innerHTML += `
        <div class="card">

          <img src="${item.img}">

          <div>

            <div><b>${item.name}</b></div>
            <div>KES ${item.price}</div>
            <div>TX: ${order.transactionId}</div>
            <div>Method: ${order.method}</div>

            <div class="status ${order.status || 'pending'}">
              ${order.status || 'pending'}
            </div>

            <br>

            <button class="approve" onclick="update(${order.id}, 'approved')">Approve</button>
            <button class="reject" onclick="update(${order.id}, 'rejected')">Reject</button>

          </div>

        </div>
      `;
    });

  });

}

/* UPDATE STATUS */
function update(id, status){

  fetch(API + "/order-status", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": localStorage.getItem("adminToken")
    },
    body: JSON.stringify({ id, status })
  })
  .then(() => loadOrders());

}

loadOrders();

</script>

</body>
</html>
