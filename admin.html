<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

header{
  background:#111827;
  padding:15px;
  text-align:center;
  color:#38bdf8;
  font-size:18px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#111827;
  padding:12px;
  border-radius:12px;
  text-align:center;
}

.search{
  padding:10px;
}

.search input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

.order{
  background:#111827;
  margin:10px;
  padding:12px;
  border-radius:12px;
  border-left:4px solid #334155;
}

.order.pending{border-left:4px solid #facc15;}
.order.approved{border-left:4px solid #22c55e;}
.order.rejected{border-left:4px solid #ef4444;}

button{
  margin:3px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.approve{background:#22c55e;color:#fff;}
.reject{background:#ef4444;color:#fff;}

.badge{
  padding:3px 8px;
  border-radius:6px;
  font-size:12px;
}

</style>
</head>

<body>

<header>📊 Admin Control Panel</header>

<!-- STATS -->
<div class="stats">
  <div class="card"><h3>Total</h3><h2 id="total">0</h2></div>
  <div class="card"><h3>Pending</h3><h2 id="pending">0</h2></div>
  <div class="card"><h3>Approved</h3><h2 id="approved">0</h2></div>
  <div class="card"><h3>Revenue</h3><h2 id="revenue">0</h2></div>
</div>

<!-- SEARCH -->
<div class="search">
  <input id="search" placeholder="Search phone or transaction ID..." oninput="render()">
</div>

<!-- ORDERS -->
<div id="orders"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

if(localStorage.getItem("adminLoggedIn") !== "true"){
  window.location.href="index.html";
}

let orders = [];

/* LOAD */
function load(){
fetch(API+"/orders")
.then(r=>r.json())
.then(data=>{
  orders = data;
  stats();
  render();
});
}

/* STATS */
function stats(){

document.getElementById("total").innerText = orders.length;

document.getElementById("pending").innerText =
orders.filter(o=>o.status==="pending").length;

document.getElementById("approved").innerText =
orders.filter(o=>o.status==="approved").length;

document.getElementById("revenue").innerText =
orders.filter(o=>o.status==="approved")
.reduce((s,o)=>s+(o.amount||0),0);

}

/* RENDER */
function render(){

let q = document.getElementById("search").value.toLowerCase();

let html = "";

orders.slice().reverse()
.filter(o =>
  (o.transactionId||"").toLowerCase().includes(q) ||
  (o.phone||"").toLowerCase().includes(q)
)
.forEach(o=>{

let items = "";
(o.cart||[]).forEach(i=>{
  items += `• ${i.name} x${i.quantity}<br>`;
});

html += `
<div class="order ${o.status}">

<h3>${o.name} - ${o.amount} KES</h3>

<p>📞 ${o.phone}</p>
<p>📍 ${o.location}</p>
<p>💳 ${o.transactionId}</p>

<p>🛒 ${items}</p>

<p>
Status:
<span class="badge">${o.status}</span>
</p>

<p>🚚 ${o.tracking}</p>

<div>

${
o.status==="pending"
? `
<button class="approve" onclick="act(${o.id},'approved')">Approve</button>
<button class="reject" onclick="act(${o.id},'rejected')">Reject</button>
`
: ""
}

</div>

</div>
`;
});

document.getElementById("orders").innerHTML = html;

}

/* ACTION */
function act(id,status){

fetch(API+"/order-status",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,status})
}).then(()=>load());

}

setInterval(load,5000);
load();

</script>

</body>
</html>
