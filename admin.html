<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:linear-gradient(90deg,#2563eb,#ef4444);
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
padding:10px;
}

.card{
background:#111827;
padding:10px;
margin:10px 0;
border-radius:10px;
}

button{
padding:6px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer;
}

.processing{background:#f59e0b;color:white;}
.delivered{background:#22c55e;color:white;}
</style>

</head>

<body>

<header>🛠 Admin Dashboard</header>

<div class="container">

<h3>📦 Orders</h3>
<div id="orders">Loading...</div>

<h3>🛍 Products</h3>
<div id="products">Loading...</div>

</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* ================= ORDERS ================= */
function loadOrders(){

fetch(API + "/orders")
.then(res => res.json())
.then(data => {

if(!Array.isArray(data)){
document.getElementById("orders").innerHTML = "Error loading orders";
return;
}

document.getElementById("orders").innerHTML =
data.map(o => `

<div class="card">

<h3>${o?.fullName || "No Name"}</h3>
<p>${o?.phone || ""}</p>
<p>${o?.location || ""}</p>

<p><b>Status:</b> ${o?.status || "Pending"}</p>

<ul>
${(o?.items || []).map(i => `
<li>${i?.name || "Item"} - KES ${i?.price || 0}</li>
`).join("")}
</ul>

<button class="processing" onclick="updateStatus('${o._id}','Processing')">Processing</button>
<button class="delivered" onclick="updateStatus('${o._id}','Delivered')">Delivered</button>

</div>

`).join("");

})
.catch(err=>{
console.log(err);
document.getElementById("orders").innerHTML = "Failed to load orders";
});

}

/* ================= UPDATE STATUS ================= */
function updateStatus(id,status){

fetch(API + "/update-order-status/" + id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({status})
})
.then(res=>res.json())
.then(()=>loadOrders());

}

/* ================= PRODUCTS ================= */
function loadProducts(){

fetch(API + "/products")
.then(res => res.json())
.then(data => {

document.getElementById("products").innerHTML =
(data || []).map(p => `

<div class="card">

<img src="${API}/uploads/${p?.image}" style="width:100%;height:120px;object-fit:contain;background:#0f172a">

<h4>${p?.name || "No Name"}</h4>
<p>KES ${p?.price || 0}</p>

</div>

`).join("");

})
.catch(err=>{
console.log(err);
document.getElementById("products").innerHTML = "Failed to load products";
});

}

/* ================= INIT ================= */
loadOrders();
loadProducts();

</script>

</body>
</html>
