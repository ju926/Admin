<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

header{
  background:#111827;
  padding:15px;
  text-align:center;
  color:#38bdf8;
  font-size:20px;
}

/* CONTAINERS */
.section{
  margin:10px;
  padding:10px;
  background:#111827;
  border-radius:10px;
}

/* INPUTS */
input, select{
  width:100%;
  padding:8px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}

/* BUTTONS */
button{
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
  width:100%;
}

.add{background:#22c55e;color:#fff;}
.delete{background:#ef4444;color:#fff;}
.update{background:#3b82f6;color:#fff;}

/* DROP ZONE */
#dropZone{
  border:2px dashed #38bdf8;
  padding:20px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
  margin-top:5px;
}

#preview{
  width:100px;
  margin-top:10px;
  display:none;
  border-radius:8px;
}

/* ITEMS */
.item{
  background:#0f172a;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

img{
  width:80px;
  border-radius:8px;
}
</style>
</head>

<body>

<header>📊 Admin Dashboard</header>

<!-- PRODUCT SECTION -->
<div class="section">
<h3>Add Product</h3>

<input id="pname" placeholder="Product name">
<input id="pprice" placeholder="Price">

<!-- DRAG & DROP -->
<div id="dropZone">
📤 Drag & Drop Image Here<br>
<small>or click to select</small>
<input type="file" id="pimage" style="display:none;">
</div>

<img id="preview">

<button class="add" onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCTS LIST -->
<div class="section">
<h3>Products</h3>
<div id="productList"></div>
</div>

<!-- ORDERS -->
<div class="section">
<h3>Orders</h3>
<div id="orders"></div>
</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* ================= DRAG & DROP ================= */

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("pimage");
const preview = document.getElementById("preview");

dropZone.addEventListener("click", ()=>{
  fileInput.click();
});

fileInput.addEventListener("change", ()=>{
  showPreview(fileInput.files[0]);
});

dropZone.addEventListener("dragover", (e)=>{
  e.preventDefault();
});

dropZone.addEventListener("drop", (e)=>{
  e.preventDefault();
  fileInput.files = e.dataTransfer.files;
  showPreview(fileInput.files[0]);
});

function showPreview(file){
  if(!file) return;

  let reader = new FileReader();

  reader.onload = function(e){
    preview.src = e.target.result;
    preview.style.display = "block";
  }

  reader.readAsDataURL(file);
}

/* ================= PRODUCTS ================= */

function addProduct(){

let file = fileInput.files[0];

let formData = new FormData();
formData.append("name", pname.value);
formData.append("price", pprice.value);
formData.append("image", file);

fetch(API+"/add-product",{
method:"POST",
body:formData
})
.then(()=>loadProducts());

}

function loadProducts(){

fetch(API+"/products")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(p=>{
html+=`
<div class="item">
<img src="${p.image}">
<h4>${p.name}</h4>
<p>${p.price} KES</p>

<button class="delete" onclick="deleteProduct(${p.id})">
Delete
</button>
</div>
`;
});

productList.innerHTML = html;

});

}

function deleteProduct(id){

fetch(API+"/delete-product",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id})
})
.then(()=>loadProducts());

}

/* ================= ORDERS ================= */

function loadOrders(){

fetch(API+"/orders")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(o=>{
html+=`
<div class="item">
<h4>${o.name}</h4>
<p>${o.phone}</p>
<p>Status: ${o.status}</p>

<select onchange="updateTracking(${o.id},this.value)">
  <option>Order placed</option>
  <option>Processing</option>
  <option>Shipped</option>
  <option>Delivered</option>
</select>

<button class="update" onclick="updateStatus(${o.id},'approved')">
Approve
</button>

<button class="delete" onclick="updateStatus(${o.id},'rejected')">
Reject
</button>

</div>
`;
});

orders.innerHTML = html;

});

}

function updateStatus(id,status){

fetch(API+"/order-status",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,status})
})
.then(()=>loadOrders());

}

function updateTracking(id,tracking){

fetch(API+"/tracking",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,tracking})
})
.then(()=>loadOrders());

}

/* INIT */
loadProducts();
loadOrders();

</script>

</body>
</html>
