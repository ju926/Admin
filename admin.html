<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pro Admin Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
header{
background:linear-gradient(90deg,#2563eb,#dc2626);
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* LOGIN SCREEN */
#loginBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#loginBox input{
padding:12px;
margin:8px;
width:250px;
border:none;
border-radius:10px;
}

#loginBox button{
padding:12px;
width:250px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

/* DASHBOARD */
.container{padding:10px}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-bottom:15px;
}

.stat{
background:#111827;
padding:12px;
border-radius:10px;
text-align:center;
border-left:4px solid #2563eb;
}

/* GRID PRODUCTS */
#products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
}

#orders{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:12px;
}

/* CARD */
.card{
background:#111827;
padding:10px;
border-radius:10px;
}

/* IMAGE */
img{
width:100%;
height:120px;
object-fit:contain;
background:#000;
border-radius:8px;
}

/* BUTTONS */
button{
padding:6px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer;
}

.del{background:#ef4444;color:white}
.edit{background:#f59e0b;color:white}
.status{background:#22c55e;color:white}

/* INPUT */
input{
padding:8px;
margin:5px 0;
width:100%;
border:none;
border-radius:8px;
}

/* HOVER */
.card:hover{
transform:scale(1.02);
transition:0.2s;
}
</style>
</head>

<body>

<header>🛠 PRO ADMIN DASHBOARD</header>

<!-- LOGIN -->
<div id="loginBox">
<h2>Admin Login</h2>
<input type="password" id="pass" placeholder="Enter password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="container">

<!-- STATS -->
<div class="stats">
<div class="stat">
<h3 id="totalProducts">0</h3>
<p>Products</p>
</div>

<div class="stat">
<h3 id="totalOrders">0</h3>
<p>Orders</p>
</div>

<div class="stat">
<h3 id="totalEarnings">0</h3>
<p>Earnings (KES)</p>
</div>
</div>

<h3>➕ Add Product</h3>

<div class="card">
<input id="pname" placeholder="Phone Name">
<input id="pprice" type="number" placeholder="Price">
<input type="file" id="pimage">
<button onclick="uploadProduct()">Upload Product</button>
</div>

<h3>📦 Orders</h3>
<div id="orders">Loading...</div>

<h3>🛍 Products</h3>
<div id="products">Loading...</div>

</div>
</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* ===== SIMPLE ADMIN LOGIN ===== */
function login(){
let pass = document.getElementById("pass").value;

if(pass === "admin123"){
document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";
loadAll();
}else{
alert("Wrong password");
}
}

/* LOAD EVERYTHING */
function loadAll(){
loadOrders();
loadProducts();
}

/* STATS */
function updateStats(products,orders){

document.getElementById("totalProducts").innerText = products.length;
document.getElementById("totalOrders").innerText = orders.length;

let earnings = 0;
orders.forEach(o=>{
if(o.amount) earnings += o.amount;
});

document.getElementById("totalEarnings").innerText = earnings;
}

/* PRODUCTS */
async function loadProducts(){

let res = await fetch(API+"/products");
let data = await res.json();

updateStats(data,[]);

document.getElementById("products").innerHTML =
(data||[]).map(p=>`

<div class="card">

<img src="${p.image}">
<h4>${p.name}</h4>
<p>KES ${p.price}</p>

<input id="p${p._id}" placeholder="new price">

<button class="edit" onclick="updatePrice('${p._id}')">Update</button>
<button class="del" onclick="deleteProduct('${p._id}')">Delete</button>

</div>

`).join("");

}

/* ORDERS */
async function loadOrders(){

let res = await fetch(API+"/orders");
let data = await res.json();

updateStats([],data);

document.getElementById("orders").innerHTML =
(data||[]).map(o=>`

<div class="card">

<h4>${o.fullName}</h4>
<p>Status: ${o.status}</p>
<p>Payment: ${o.paymentMethod || ""}</p>
<p>Code: ${o.transactionCode || ""}</p>
<p>Amount: KES ${o.amount || 0}</p>

<button class="status" onclick="updateStatus('${o._id}','Processing')">Processing</button>
<button class="status" onclick="updateStatus('${o._id}','Delivered')">Delivered</button>
<button class="del" onclick="deleteOrder('${o._id}')">Delete</button>

</div>

`).join("");

}

/* UPLOAD PRODUCT */
async function uploadProduct(){

let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;
let file=document.getElementById("pimage").files[0];

let form=new FormData();
form.append("name",name);
form.append("price",price);
form.append("image",file);

await fetch(API+"/products",{method:"POST",body:form});

loadProducts();
}

/* UPDATE PRICE */
function updatePrice(id){

let price=document.getElementById("p"+id).value;

fetch(API+"/product/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({price})
}).then(loadProducts);
}

/* DELETE PRODUCT */
function deleteProduct(id){
fetch(API+"/product/"+id,{method:"DELETE"}).then(loadProducts);
}

/* ORDER STATUS */
function updateStatus(id,status){
fetch(API+"/update-order-status/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({status})
}).then(loadOrders);
}

/* DELETE ORDER */
function deleteOrder(id){
fetch(API+"/order/"+id,{method:"DELETE"}).then(loadOrders);
}

</script>

</body>
</html>
