<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
}

/* HEADER */
header{
background:linear-gradient(90deg,#1d4ed8,#ef4444);
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* UPLOAD SECTION */
.uploadBox{
padding:15px;
background:#111827;
margin:10px;
border-radius:10px;
}

input[type="file"]{
width:100%;
padding:10px;
background:#fff;
color:#000;
border-radius:8px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:15px;
}

/* CARD */
.card{
background:#1f2937;
padding:10px;
border-radius:10px;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

.card input{
width:100%;
margin-top:5px;
padding:6px;
border:none;
border-radius:5px;
}

/* BUTTON */
button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.uploadBtn{
background:#22c55e;
color:#fff;
}

.removeBtn{
background:#ef4444;
color:#fff;
}
</style>
</head>

<body>

<header>🛠️ Admin Product Upload</header>

<div class="uploadBox">

<!-- FILE INPUT (THIS WAS MISSING BEFORE) -->
<input type="file" id="images" multiple accept="image/*">

<!-- PREVIEW AREA -->
<div class="grid" id="preview"></div>

<!-- UPLOAD BUTTON -->
<button class="uploadBtn" onclick="uploadAll()">Upload All Products</button>

</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

let products = [];

const imagesInput = document.getElementById("images");
const preview = document.getElementById("preview");

/* SELECT IMAGES */
imagesInput.addEventListener("change", function () {

products = [];
preview.innerHTML = "";

Array.from(this.files).forEach((file, index) => {

const reader = new FileReader();

reader.onload = function (e) {

products.push({
image: e.target.result,
name: "",
price: ""
});

/* CREATE CARD */
const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<img src="${e.target.result}">

<input placeholder="Product Name" oninput="products[${index}].name=this.value">
<input placeholder="Price" type="number" oninput="products[${index}].price=this.value">

<button class="removeBtn" onclick="removeItem(${index})">Remove</button>
`;

preview.appendChild(card);

};

reader.readAsDataURL(file);

});

});

/* REMOVE ITEM */
function removeItem(index){

products.splice(index,1);
preview.innerHTML = "";

/* re-render */
products.forEach((p,i)=>{

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<img src="${p.image}">

<input placeholder="Product Name" oninput="products[${i}].name=this.value">
<input placeholder="Price" type="number" oninput="products[${i}].price=this.value">

<button class="removeBtn" onclick="removeItem(${i})">Remove</button>
`;

preview.appendChild(card);

});

}

/* UPLOAD ALL PRODUCTS */
function uploadAll(){

if(products.length === 0){
alert("No products selected");
return;
}

products.forEach(p => {

fetch(API+"/add-product", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({
name: p.name,
price: p.price,
image: p.image
})
});

});

alert("Products uploaded successfully 🚀");

products = [];
preview.innerHTML = "";
imagesInput.value = "";

}

</script>

</body>
</html>
