<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}
.container{max-width:600px;margin:auto;padding:15px}
input{width:100%;padding:10px;margin:8px 0}
button{padding:10px;border:none;border-radius:8px;cursor:pointer}
.add{background:#22c55e;width:100%}

.card{background:#111827;padding:10px;margin-top:10px;border-radius:10px;display:flex;gap:10px}
img{width:60px;height:60px;object-fit:cover;border-radius:8px}

.edit{background:#2563eb;color:white}
.del{background:#ef4444;color:white}
</style>

</head>
<body>

<div class="container">

<h2>Admin Products</h2>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input type="file" id="image">

<button class="add" onclick="add()">Add Product</button>

<div id="list"></div>

</div>

<script>

const API="https://phone-store-backend-9w7p.onrender.com";

function load(){
fetch(API+"/products")
.then(r=>r.json())
.then(data=>{
document.getElementById("list").innerHTML =
data.map(p=>`
<div class="card">
<img src="${API}/uploads/${p.image}">
<div>
<b>${p.name}</b><br>KES ${p.price}
</div>

<button class="edit" onclick="edit('${p._id}','${p.price}')">Edit</button>
<button class="del" onclick="del('${p._id}')">Delete</button>
</div>
`).join("");
});
}

load();

function add(){
let f=new FormData();
f.append("name",name.value);
f.append("price",price.value);
f.append("image",image.files[0]);

fetch(API+"/add-product-upload",{method:"POST",body:f})
.then(()=>load());
}

function del(id){
fetch(API+"/delete-product/"+id,{method:"DELETE"})
.then(()=>load());
}

function edit(id,price){
let p=prompt("New price",price);
fetch(API+"/update-product/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({price:p})
}).then(()=>load());
}

</script>

</body>
</html>
