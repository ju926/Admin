<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MALONE ADMIN</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:15px;
background:linear-gradient(90deg,#2563eb,#dc2626);
font-size:20px;
font-weight:bold;
}

#loginBox{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

input{
padding:10px;
margin:6px;
width:260px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
}

button{
padding:10px 12px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.edit{background:#f59e0b;color:white;}
.del{background:#ef4444;color:white;}
.upload{background:#2563eb;color:white;}

.container{
padding:10px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-bottom:15px;
}

.stat{
background:#111827;
padding:15px;
border-radius:10px;
text-align:center;
}

#products,#orders{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.card{
background:#111827;
padding:10px;
border-radius:10px;
}

img{
width:100%;
height:120px;
object-fit:contain;
background:#000;
border-radius:8px;
}

#logs{
background:#000;
color:#00ff00;
padding:10px;
margin-top:10px;
font-size:12px;
white-space:pre-line;
border-radius:10px;
}

@media(max-width:600px){
#products,#orders{
grid-template-columns:repeat(2,1fr);
}
}

</style>
</head>

<body>

<header>
MALONE ADMIN
</header>

<!-- LOGIN -->
<div id="loginBox">

<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none" class="container">

<div id="stats" class="stats"></div>

<h3>➕ Add Product</h3>

<div class="card">

<input id="pname" placeholder="Product Name">
<input id="pprice" type="number" placeholder="Price">
<input type="file" id="pimage">

<button class="upload" onclick="uploadProduct()">
Upload Product
</button>

</div>

<h3>🛍 Products</h3>
<div id="products"></div>

<h3>📦 Orders</h3>
<div id="orders"></div>

<h3>📡 Logs</h3>
<div id="logs">Logs appear here...</div>

<button onclick="logout()" class="del">
Logout
</button>

</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* ================= AUTO LOGIN CHECK (NEW) ================= */
window.onload = () => {
const token = localStorage.getItem("adminToken");

if(token){
showDashboard();
loadAll();
}
};

/* ================= LOGIN ================= */
async function login(){

let res = await fetch(API + "/admin-login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email.value,
password:pass.value
})
});

let data = await res.json();

if(data.token){

localStorage.setItem("adminToken", data.token);

showDashboard();
loadAll();

}else{
alert("Login failed");
}

}

/* ================= SHOW DASHBOARD ================= */
function showDashboard(){
document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";
}

/* ================= AUTH ================= */
function auth(){
return {
Authorization:"Bearer " + localStorage.getItem("adminToken")
};
}

/* ================= LOAD ALL ================= */
function loadAll(){
loadStats();
loadProducts();
loadOrders();
}

/* ================= STATS ================= */
async function loadStats(){

let [pRes,oRes] = await Promise.all([
fetch(API + "/products"),
fetch(API + "/orders",{headers:auth()})
]);

let products = await pRes.json();
let ordersData = await oRes.json();

let revenue = 0;
ordersData.forEach(o => revenue += o.total || 0);

stats.innerHTML = `
<div class="stat">📦 Products<br>${products.length}</div>
<div class="stat">🛒 Orders<br>${ordersData.length}</div>
<div class="stat">💰 Revenue<br>KES ${revenue}</div>
`;

}

/* ================= UPLOAD ================= */
async function uploadProduct(){

let form = new FormData();
form.append("name", pname.value);
form.append("price", pprice.value);
form.append("image", pimage.files[0]);

await fetch(API + "/products",{
method:"POST",
headers:auth(),
body:form
});

loadProducts();
}

/* ================= PRODUCTS ================= */
async function loadProducts(){

let res = await fetch(API + "/products");
let data = await res.json();

products.innerHTML = data.map(p => `
<div class="card">

<img src="${p.image}">
<h4>${p.name}</h4>
<p>KES ${p.price}</p>

<input id="name${p._id}" placeholder="Edit name">
<button class="edit" onclick="updateName('${p._id}')">Edit</button>

<input id="price${p._id}" placeholder="Edit price">
<button class="edit" onclick="updatePrice('${p._id}')">Price</button>

<button class="del" onclick="deleteProduct('${p._id}')">Delete</button>

</div>
`).join("");

}

/* ================= UPDATE ================= */
function updateName(id){
fetch(API + "/product/" + id,{
method:"PUT",
headers:Object.assign({"Content-Type":"application/json"},auth()),
body:JSON.stringify({name:document.getElementById("name"+id).value})
}).then(loadProducts);
}

function updatePrice(id){
fetch(API + "/product/" + id,{
method:"PUT",
headers:Object.assign({"Content-Type":"application/json"},auth()),
body:JSON.stringify({price:document.getElementById("price"+id).value})
}).then(loadProducts);
}

/* ================= DELETE PRODUCT ================= */
function deleteProduct(id){
fetch(API + "/product/" + id,{
method:"DELETE",
headers:auth()
}).then(loadProducts);
}

/* ================= ORDERS ================= */
async function loadOrders(){

let res = await fetch(API + "/orders",{headers:auth()});
let data = await res.json();

orders.innerHTML = data.map(o => `
<div class="card">
<h4>${o.phone}</h4>
<p>KES ${o.total}</p>
<p>Status: ${o.status}</p>

<button class="edit" onclick="markPaid('${o._id}')">Paid</button>
<button class="del" onclick="deleteOrder('${o._id}')">Delete</button>
</div>
`).join("");

}

/* ================= MARK PAID ================= */
async function markPaid(id){
await fetch(API + "/order/" + id + "/paid",{method:"PUT",headers:auth()});
loadOrders();
}

/* ================= DELETE ORDER ================= */
async function deleteOrder(id){
await fetch(API + "/order/" + id,{method:"DELETE",headers:auth()});
loadOrders();
}

/* ================= LOGOUT ================= */
function logout(){
localStorage.removeItem("adminToken");
location.reload();
}

</script>

</body>
</html>
