<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

header{
  background:#111827;
  padding:15px;
  text-align:center;
  color:#38bdf8;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.card h2{
  margin:5px 0;
  color:#22c55e;
}

/* ORDERS */
.order{
  background:#111827;
  margin:10px;
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

.order img{
  width:60px;
  height:60px;
  border-radius:8px;
  object-fit:cover;
}

button{
  padding:6px 8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.approve{background:#22c55e;color:#fff;}
.reject{background:#ef4444;color:#fff;}

.status{
  font-size:12px;
  padding:3px 6px;
  border-radius:5px;
  background:#334155;
}

/* logout */
#logout{
  position:fixed;
  top:10px;
  right:10px;
  background:#ef4444;
  color:#fff;
  padding:8px;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<button id="logout" onclick="logout()">Logout</button>

<header>📊 Admin Dashboard Pro</header>

<!-- STATS -->
<div class="stats">

  <div class="card">
    <h3>Total Orders</h3>
    <h2 id="total">0</h2>
  </div>

  <div class="card">
    <h3>Pending</h3>
    <h2 id="pending">0</h2>
  </div>

  <div class="card">
    <h3>Approved</h3>
    <h2 id="approved">0</h2>
  </div>

  <div class="card">
    <h3>Revenue</h3>
    <h2 id="revenue">0</h2>
  </div>

</div>

<!-- ORDERS -->
<div id="orders"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* LOGIN CHECK */
if(localStorage.getItem("adminLoggedIn") !== "true"){
  window.location.href = "index.html";
}

function logout(){
  localStorage.removeItem("adminLoggedIn");
  window.location.href = "index.html";
}

let orders = [];

/* LOAD */
function loadOrders(){

  fetch(API + "/orders")
  .then(res => res.json())
  .then(data=>{
    orders = data;
    renderStats();
    renderOrders();
  });

}

/* STATS */
function renderStats(){

  let total = orders.length;
  let pending = orders.filter(o=>o.status==="pending").length;
  let approved = orders.filter(o=>o.status==="approved").length;
  let revenue = orders
    .filter(o=>o.status==="approved")
    .reduce((sum,o)=>sum + (o.amount || 0),0);

  document.getElementById("total").innerText = total;
  document.getElementById("pending").innerText = pending;
  document.getElementById("approved").innerText = approved;
  document.getElementById("revenue").innerText = revenue;

}

/* ORDERS */
function renderOrders(){

  let html = "";

  orders.slice().reverse().forEach(o=>{

    let img = o.cart?.[0]?.img || "https://via.placeholder.com/60";

    html += `
      <div class="order">

        <img src="${img}">

        <div style="flex:1">
          <b>${o.method}</b><br>
          ${o.amount} KES<br>
          ${o.transactionId}<br>
          <span class="status">${o.status}</span>
        </div>

        ${
          o.status==="pending"
          ? `
            <div>
              <button class="approve" onclick="update(${o.id},'approved')">✔</button>
              <button class="reject" onclick="update(${o.id},'rejected')">✖</button>
            </div>
          `
          : `<b>${o.status.toUpperCase()}</b>`
        }

      </div>
    `;
  });

  document.getElementById("orders").innerHTML = html;
}

/* UPDATE */
function update(id,status){

  fetch(API+"/order-status",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id,status})
  })
  .then(()=>loadOrders());

}

/* AUTO REFRESH */
setInterval(loadOrders,4000);
loadOrders();

</script>

</body>
</html>
