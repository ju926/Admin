<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
}

header{
background:linear-gradient(90deg,#1d4ed8,#ef4444);
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* FORM */
.form{
padding:10px;
background:#111827;
margin:10px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
outline:none;
}

/* BUTTONS */
button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.add{
background:#22c55e;
color:#fff;
}

/* IMAGE UPLOAD BUTTON */
.upload-label{
display:block;
background:linear-gradient(90deg,#1d4ed8,#ef4444);
color:white;
padding:12px;
border-radius:8px;
text-align:center;
cursor:pointer;
margin-top:8px;
font-weight:bold;
}

/* PREVIEW */
#previewImg{
width:100%;
margin-top:10px;
border-radius:8px;
display:none;
height:150px;
object-fit:cover;
}

/* PRODUCTS LIST */
.list{
padding:10px;
}

.card{
background:#111827;
margin-top:10px;
padding:10px;
border-radius:10px;
}

img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.edit{
background:#1d4ed8;
color:#fff;
}

.delete{
background:#ef4444;
color:#fff;
}
</style>
</head>

<body>

<header>🛠️ Admin Dashboard</header>

<!-- ADD PRODUCT FORM -->
<div class="form">

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">

<!-- IMAGE UPLOAD BUTTON -->
<label class="upload-label">
📤 Upload Product Image
<input type="file" id="imageFile" accept="image/*" style="display:none;">
</label>

<img id="previewImg">

<button class="add" onclick="addProduct()">Add Product</button>

</div>

<!-- PRODUCT LIST -->
<div class="list" id="list"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

let imageBase64 = "";

/* IMAGE UPLOAD */
document.getElementById("imageFile").addEventListener("change", function(){

const file = this.files[0];

const reader = new FileReader();

reader.onload = function(e){

imageBase64 = e.target.result;

const img = document.getElementById("previewImg");
img.src = imageBase64;
img.style.display = "block";

};

reader.readAsDataURL(file);

});

/* LOAD PRODUCTS */
function loadProducts(){

fetch(API+"/products")
.then(r=>r.json())
.then(render);

}

/* RENDER PRODUCTS */
function render(products){

list.innerHTML = products.map(p=>`
<div class="card">

<img src="${p.image}">

<input id="name-${p.id}" value="${p.name}">
<input id="price-${p.id}" value="${p.price}">

<button class="edit" onclick="update(${p.id})">Update</button>
<button class="delete" onclick="del(${p.id})">Delete</button>

</div>
`).join("");

}

/* ADD PRODUCT */
function addProduct(){

fetch(API+"/add-product",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
name:name.value,
price:price.value,
image:imageBase64
})
})
.then(()=>loadProducts());

name.value="";
price.value="";
imageBase64="";
document.getElementById("imageFile").value="";
document.getElementById("previewImg").style.display="none";

}

/* UPDATE PRODUCT */
function update(id){

fetch(API+"/update-product/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
name:document.getElementById("name-"+id).value,
price:document.getElementById("price-"+id).value,
image:imageBase64 || undefined
})
})
.then(()=>loadProducts());

}

/* DELETE PRODUCT */
function del(id){

fetch(API+"/delete-product/"+id,{
method:"DELETE"
})
.then(()=>loadProducts());

}

/* INIT */
loadProducts();

</script>

</body>
  </html>
