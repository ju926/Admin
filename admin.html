<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Secure Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
padding:15px;
background:linear-gradient(90deg,#2563eb,#dc2626);
text-align:center;
font-size:20px;
font-weight:bold;
}

/* LOGIN */
#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#0b1220;
}

input{
padding:10px;
margin:8px;
width:260px;
border-radius:8px;
border:none;
background:#1f2937;
color:white;
}

button{
padding:10px;
width:260px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

/* DASHBOARD */
.container{padding:10px}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

.stat{
background:#111827;
padding:10px;
border-radius:10px;
text-align:center;
}

#products,#orders{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
}

.card{
background:#111827;
padding:10px;
border-radius:10px;
}

img{
width:100%;
height:120px;
object-fit:contain;
background:#000;
}

.file-upload label{
display:block;
background:linear-gradient(90deg,#2563eb,#dc2626);
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.file-upload input{display:none}

</style>
</head>

<body>

<header>🔐 SECURE ADMIN PANEL</header>

<!-- LOGIN -->
<div id="loginBox">
<h2>Admin Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="container">

<div class="stats">
<div class="stat">Products</div>
<div class="stat">Orders</div>
</div>

<h3>➕ Add Product</h3>

<div class="card">
<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">

<div class="file-upload">
<label for="pimage">Choose Image</label>
<input type="file" id="pimage">
</div>

<button onclick="addProduct()">Upload</button>
</div>

<h3>Products</h3>
<div id="products"></div>

<h3>Orders</h3>
<div id="orders"></div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script>

const API="https://phone-store-backend-9w7p.onrender.com";

function getToken(){
return localStorage.getItem("adminToken");
}

/* LOGIN */
async function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("pass").value;

let res=await fetch(API+"/admin-login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

let data=await res.json();

if(data.token){
localStorage.setItem("adminToken",data.token);
document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";
loadAll();
}else{
alert("Login failed");
}

}

/* HEADERS */
function authHeader(){
return {
"Authorization":"Bearer "+getToken()
};
}

/* LOAD DATA */
async function loadAll(){
loadProducts();
loadOrders();
}

/* PRODUCTS */
async function loadProducts(){
let res=await fetch(API+"/products");
let data=await res.json();

document.getElementById("products").innerHTML=
data.map(p=>`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<p>${p.price}</p>
</div>
`).join("");
}

/* ORDERS */
async function loadOrders(){
let res=await fetch(API+"/orders",{
headers:authHeader()
});
let data=await res.json();

document.getElementById("orders").innerHTML=
data.map(o=>`
<div class="card">
<h4>${o.fullName}</h4>
<p>${o.total}</p>
</div>
`).join("");
}

/* ADD PRODUCT */
async function addProduct(){

let form=new FormData();
form.append("name",document.getElementById("pname").value);
form.append("price",document.getElementById("pprice").value);
form.append("image",document.getElementById("pimage").files[0]);

await fetch(API+"/products",{
method:"POST",
headers:authHeader(),
body:form
});

loadProducts();
}

/* LOGOUT */
function logout(){
localStorage.removeItem("adminToken");
location.reload();
}

</script>

</body>
</html>
