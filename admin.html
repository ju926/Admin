<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MALONE ADMIN</title>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:15px;
background:linear-gradient(90deg,#2563eb,#dc2626);
font-size:20px;
font-weight:bold;
}

#loginBox{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

input{
padding:10px;
margin:6px;
width:260px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
}

button{
padding:10px 12px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.edit{background:#f59e0b;color:white;}
.del{background:#ef4444;color:white;}
.upload{background:#2563eb;color:white;}

.container{
padding:10px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-bottom:15px;
}

.stat{
background:#111827;
padding:15px;
border-radius:10px;
text-align:center;
}

#products,#orders{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.card{
background:#111827;
padding:10px;
border-radius:10px;
}

img{
width:100%;
height:120px;
object-fit:contain;
background:#000;
border-radius:8px;
}

#logs{
background:#000;
color:#00ff00;
padding:10px;
margin-top:10px;
font-size:12px;
white-space:pre-line;
border-radius:10px;
}

/* STATUS BADGE */
.status{
padding:5px 10px;
border-radius:8px;
display:inline-block;
font-weight:bold;
font-size:12px;
margin-top:5px;
}

.paid{background:#22c55e33;color:#22c55e;}
.pending{background:#facc1533;color:#facc15;}
.failed{background:#ef444433;color:#ef4444;}

@media(max-width:600px){
#products,#orders{
grid-template-columns:repeat(2,1fr);
}
}

</style>
</head>

<body>

<header>
MALONE ADMIN
</header>

<div id="loginBox">

<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="dashboard" style="display:none" class="container">

<div id="stats" class="stats"></div>

<h3>➕ Add Product</h3>

<div class="card">

<input id="pname" placeholder="Product Name">
<input id="pprice" type="number" placeholder="Price">
<input type="file" id="pimage">

<button class="upload" onclick="uploadProduct()">
Upload Product
</button>

</div>

<h3>🛍 Products</h3>
<div id="products"></div>

<h3>📦 Orders (LIVE)</h3>
<div id="orders"></div>

<h3>📡 Logs</h3>
<div id="logs">Logs appear here...</div>

<button onclick="logout()" class="del">
Logout
</button>

</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* SOCKET */
const socket = io(API);

function log(msg){
document.getElementById("logs").innerHTML += "\n> " + msg;
}

/* LIVE TRACKING */
function enableLiveTracking(){

socket.on("statusUpdate", (data)=>{
log("LIVE: " + JSON.stringify(data));
loadOrders();
loadStats();
});

}

/* LOGIN */
async function login(){

let res = await fetch(API + "/admin-login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email.value,
password:pass.value
})
});

let data = await res.json();

if(data.token){

localStorage.setItem("adminToken",data.token);

loginBox.style.display="none";
dashboard.style.display="block";

enableLiveTracking();
loadAll();

}else{
alert("Login failed");
}

}

/* AUTH */
function auth(){
return{
Authorization:"Bearer " + localStorage.getItem("adminToken")
};
}

/* LOAD ALL */
function loadAll(){
loadStats();
loadProducts();
loadOrders();
}

/* STATS */
async function loadStats(){

let [pRes,oRes] = await Promise.all([
fetch(API + "/products"),
fetch(API + "/orders",{headers:auth()})
]);

let products = await pRes.json();
let ordersData = await oRes.json();

let revenue = 0;
ordersData.forEach(o=>{
revenue += o.total || 0;
});

stats.innerHTML = `
<div class="stat">📦 Products<br>${products.length}</div>
<div class="stat">🛒 Orders<br>${ordersData.length}</div>
<div class="stat">💰 Revenue<br>KES ${revenue}</div>
`;

}

/* UPLOAD */
async function uploadProduct(){

try{

let form = new FormData();
form.append("name",pname.value);
form.append("price",pprice.value);
form.append("image",pimage.files[0]);

await fetch(API + "/products",{
method:"POST",
headers:{
Authorization:"Bearer " + localStorage.getItem("adminToken")
},
body:form
});

log("Product uploaded");
loadProducts();

}catch(err){
log(err.message);
}

}

/* PRODUCTS */
async function loadProducts(){

let res = await fetch(API + "/products");
let data = await res.json();

products.innerHTML = data.map(p=>`
<div class="card">

<img src="${p.image}">
<h4>${p.name}</h4>
<p>KES ${p.price}</p>

</div>
`).join("");

}

/* ORDERS */
async function loadOrders(){

let res = await fetch(API + "/orders",{
headers:auth()
});

let data = await res.json();

orders.innerHTML = data.map(o=>`

<div class="card">

<h4>${o.phone}</h4>
<p>KES ${o.total}</p>

<div class="status ${o.status.toLowerCase()}">
${o.status}
</div>

<button class="edit" onclick="markPaid('${o._id}')">
Mark Paid
</button>

<button class="del" onclick="deleteOrder('${o._id}')">
Delete
</button>

</div>

`).join("");

}

/* MARK PAID */
async function markPaid(id){

await fetch(API + "/order/" + id + "/paid",{
method:"PUT",
headers:auth()
});

loadOrders();

}

/* DELETE */
async function deleteOrder(id){

await fetch(API + "/order/" + id,{
method:"DELETE",
headers:auth()
});

loadOrders();

}

/* LOGOUT */
function logout(){
localStorage.removeItem("adminToken");
location.reload();
}

</script>

</body>
</html>
