<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
}

header{
background:linear-gradient(90deg,#1d4ed8,#ef4444);
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* PRODUCTS */
.container{
padding:10px;
}

.card{
background:#111827;
margin-bottom:10px;
padding:10px;
border-radius:10px;
display:flex;
gap:10px;
}

.card img{
width:80px;
height:80px;
object-fit:cover;
border-radius:8px;
}

.info{
flex:1;
}

input{
width:100%;
padding:5px;
margin-top:5px;
border:none;
border-radius:5px;
}

button{
margin-top:5px;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.edit{
background:#1d4ed8;
color:#fff;
}

.save{
background:#22c55e;
color:#fff;
}

.delete{
background:#ef4444;
color:#fff;
}
</style>
</head>

<body>

<header>🛠️ Admin Dashboard</header>

<div class="container" id="list"></div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

let products = [];

/* LOAD PRODUCTS */
function load(){

fetch(API+"/products")
.then(r=>r.json())
.then(data=>{
products = data;
render();
});

}

/* RENDER */
function render(){

let html = "";

products.forEach((p,index)=>{

html += `
<div class="card">

<img src="${p.image}">

<div class="info">

<input id="name-${p.id}" value="${p.name}">
<input id="price-${p.id}" value="${p.price}">
<input id="image-${p.id}" value="${p.image}">

<button class="save" onclick="save('${p.id}')">Save</button>
<button class="delete" onclick="remove('${p.id}')">Delete</button>

</div>

</div>
`;

});

list.innerHTML = html;
}

/* SAVE EDIT */
function save(id){

fetch(API+"/update-product/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
name: document.getElementById("name-"+id).value,
price: document.getElementById("price-"+id).value,
image: document.getElementById("image-"+id).value
})
})
.then(r=>r.json())
.then(()=>{
alert("Updated ✔");
load();
});

}

/* DELETE */
function remove(id){

fetch(API+"/delete-product/"+id,{
method:"DELETE"
})
.then(()=>{
alert("Deleted ❌");
load();
});

}

/* INIT */
load();

</script>

</body>
</html>
