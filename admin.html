<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Upload</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
padding:10px;
}

header{
background:linear-gradient(90deg,#1d4ed8,#ef4444);
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
border-radius:10px;
}

/* UPLOAD BOX */
.uploadBox{
margin-top:15px;
background:#111827;
padding:15px;
border-radius:10px;
}

input[type="file"]{
width:100%;
padding:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:15px;
}

/* CARD */
.card{
background:#111827;
padding:10px;
border-radius:10px;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

.card input{
width:100%;
margin-top:5px;
padding:6px;
border:none;
border-radius:5px;
}

button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.uploadBtn{
background:#22c55e;
color:#fff;
}

.removeBtn{
background:#ef4444;
color:#fff;
}
</style>
</head>

<body>

<header>📦 Admin Multi Upload</header>

<div class="uploadBox">

<input type="file" id="images" multiple accept="image/*">

<div class="grid" id="preview"></div>

<button class="uploadBtn" onclick="uploadAll()">Upload All Products</button>

</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

let products = [];

/* SELECT IMAGES */
images.onchange = function(){

preview.innerHTML = "";
products = [];

Array.from(this.files).forEach((file, index)=>{

let reader = new FileReader();

reader.onload = function(e){

let product = {
image: e.target.result,
name: "",
price: ""
};

products.push(product);

preview.innerHTML += `
<div class="card">

<img src="${e.target.result}">

<input placeholder="Product Name" oninput="products[${index}].name=this.value">
<input placeholder="Price" type="number" oninput="products[${index}].price=this.value">

</div>
`;

};

reader.readAsDataURL(file);

});

};

/* UPLOAD ALL */
function uploadAll(){

products.forEach(p=>{

fetch(API+"/add-product",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
name: p.name,
price: p.price,
image: p.image
})
});

});

alert("Products uploaded successfully 🚀");

images.value = "";
preview.innerHTML = "";
products = [];

}

</script>

</body>
</html>
