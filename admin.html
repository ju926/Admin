<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{font-family:Arial;background:#0b1220;color:white;margin:0}
.container{padding:20px;max-width:600px;margin:auto}
input{width:100%;padding:10px;margin:8px 0}
button{width:100%;padding:12px;background:#2563eb;color:white;border:none}
.card{background:#111827;padding:10px;margin:10px 0}
img{width:60px;height:60px;object-fit:cover}
</style>
</head>

<body>

<div class="container">

<h2>Admin Upload</h2>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input type="file" id="image">

<button onclick="upload()">Add Product</button>

<div id="list"></div>

</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* UPLOAD */
async function upload(){

const name = document.getElementById("name").value;
const price = document.getElementById("price").value;
const file = document.getElementById("image").files[0];

if(!name || !price || !file){
alert("Fill all fields");
return;
}

let form = new FormData();
form.append("name", name);
form.append("price", price);
form.append("image", file);

await fetch(API+"/add-product-upload",{
method:"POST",
body:form
});

alert("Uploaded ✔");

load();

}

/* LOAD */
function load(){

fetch(API+"/products")
.then(res=>res.json())
.then(data=>{

document.getElementById("list").innerHTML =
data.map(p=>`

<div class="card">
<img src="${API}/uploads/${p.image}">
<div>
${p.name} - KES ${p.price}
</div>
</div>

`).join("");

});

}

load();

</script>

</body>
</html>
