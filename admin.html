<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.container{
padding:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#111827;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:bold;
}

.card{
background:#111827;
padding:10px;
margin:10px 0;
border-radius:10px;
}

img{
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Admin Panel</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">

<input type="file" id="imageFile">

<button onclick="add()">Add Product</button>

<div id="list"></div>

</div>

<script>

const API = "https://phone-store-backend-9w7p.onrender.com";

/* LOAD */
function load(){
fetch(API+"/products")
.then(res=>res.json())
.then(data=>{
document.getElementById("list").innerHTML =
data.map(p=>{

let img = p.image;
if(img){
img = API + "/uploads/" + img;
}

return `
<div class="card">
<img src="${img}">
<b>${p.name}</b><br>
KES ${p.price}
</div>
`;
}).join("");
});
}

load();

/* ADD PRODUCT */
function add(){

let formData = new FormData();
formData.append("name",document.getElementById("name").value);
formData.append("price",document.getElementById("price").value);
formData.append("image",document.getElementById("imageFile").files[0]);

fetch(API+"/add-product-upload",{
method:"POST",
body:formData
})
.then(()=>load());

}

</script>

</body>
</html>
