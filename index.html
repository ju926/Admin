<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.box{
  background:#111827;
  padding:20px;
  border-radius:12px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
}

#error{
  color:#f87171;
  font-size:13px;
  margin-top:8px;
  text-align:center;
}
</style>
</head>

<body>

<div class="box">
<h2 style="text-align:center">Admin Login</h2>

<input type="password" id="password" placeholder="Enter password">

<button onclick="login()">Login</button>

<div id="error"></div>
</div>

<script>

const ADMIN_PASSWORD = "admin123"; // CHANGE THIS

function login(){

  let pass = document.getElementById("password").value;

  if(pass === ADMIN_PASSWORD){

    localStorage.setItem("adminLoggedIn","true");

    window.location.href = "admin.html";

  } else {
    document.getElementById("error").innerText = "❌ Wrong password";
  }

}

</script>

</body>
</html>
